<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | MrCash</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #00ff6a; --bg: #000; --card: #111; }
        body { background: var(--bg); color: white; font-family: 'Cairo', sans-serif; padding-bottom: 80px; }
        
        header { padding: 20px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        .page { display: none; padding: 20px; }
        .active { display: block; }

        /* تصميم الأزرار السفلية */
        .navbar { position: fixed; bottom: 0; width: 100%; background: #080808; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #222; }
        .nav-item { color: #555; text-align: center; cursor: pointer; flex: 1; }
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 1.4rem; display: block; }

        /* البطاقات */
        .card { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #222; margin-bottom: 15px; display: flex; align-items: center; gap: 15px; }
        
        #iframe-window { position: fixed; inset: 0; background: white; z-index: 2000; display: none; flex-direction: column; }
    </style>
</head>
<body>

    <header>
        <span style="font-weight: 900; color:var(--primary)">MR CASH</span>
        <div style="color:var(--primary); font-weight:bold;">0.00 PTS</div>
    </header>

    <div id="page-offers" class="page active">
        <h2>شركات العروض</h2>
        <div class="card" onclick="openWall('adlexy')"><i class="fas fa-tasks"></i> Adlexy Wall</div>
        <div class="card" onclick="openWall('gemiad')"><i class="fas fa-gamepad"></i> GemiAd Wall</div>
    </div>

    <div id="page-withdraw" class="page">
        <h2>سحب الأرباح</h2>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div class="card" style="flex-direction: column;"><img src="https://upload.wikimedia.org/wikipedia/commons/b/b5/PayPal.svg" width="40"> PayPal</div>
            <div class="card" style="flex-direction: column;"><img src="https://upload.wikimedia.org/wikipedia/commons/4/46/Bitcoin.svg" width="40"> Binance</div>
        </div>
    </div>

    <div id="page-profile" class="page" style="text-align: center;">
        <img id="u-img" src="" style="width: 80px; border-radius: 50%; border: 2px solid var(--primary);">
        <h3 id="u-name" style="margin-top: 10px;">...</h3>
        <p id="u-email" style="color:#666;"></p>
        <button onclick="logout()" style="margin-top: 30px; color: red; background: none; border: 1px solid red; padding: 10px 20px; border-radius: 10px;">خروج</button>
    </div>

    <nav class="navbar">
        <div class="nav-item active" onclick="show('offers', this)"><i class="fas fa-home"></i><span>العروض</span></div>
        <div class="nav-item" onclick="show('withdraw', this)"><i class="fas fa-wallet"></i><span>السحب</span></div>
        <div class="nav-item" onclick="show('profile', this)"><i class="fas fa-user"></i><span>حسابي</span></div>
    </nav>

    <div id="iframe-window">
        <div style="background:#000; padding:15px; display:flex; justify-content:space-between;">
            <span>جدار العروض</span>
            <button onclick="document.getElementById('iframe-window').style.display='none'" style="color:var(--primary)">إغلاق</button>
        </div>
        <div id="iframe-box" style="flex:1"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAd9KgnzExZ5RdrJVB_hpzxUvrqHiQ3jmU",
            authDomain: "mrcash-com.firebaseapp.com",
            projectId: "mrcash-com",
            appId: "1:348374269609:web:9fed2a4f69f2c0f00ff3b8"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        let userUID = "";

        onAuthStateChanged(auth, u => {
            if(u) {
                userUID = u.uid;
                document.getElementById('u-name').innerText = u.displayName || "مستخدم";
                document.getElementById('u-email').innerText = u.email;
                document.getElementById('u-img').src = u.photoURL || 'https://via.placeholder.com/80';
            } else {
                window.location.href = "index.html";
            }
        });

        window.show = (id, el) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        };

        window.openWall = (type) => {
            let url = (type === 'adlexy') 
                ? `https://adlexy.com/offerwall/h7mx23bis2zaib6apwwe73uv3gr92i/${userUID}`
                : `https://gemiad.com/offerwall/750/مصعب123/${userUID}`;
            document.getElementById('iframe-box').innerHTML = `<iframe src="${url}" style="width:100%; height:100%; border:0;"></iframe>`;
            document.getElementById('iframe-window').style.display = 'flex';
        };

        window.logout = () => signOut(auth);
    </script>
</body>
</html>
