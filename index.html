<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mr. Cash | مستر كاش</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --main-green: #2ecc71;
            --dark-bg: #0d1117;
            --card-bg: #161b22;
            --text-gray: #8b949e;
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
        }

        /* الهيدر العلوي */
        header {
            background: #010409;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #30363d;
        }

        .brand { display: flex; align-items: center; gap: 10px; }
        .brand img { width: 40px; height: 40px; border-radius: 8px; }
        .logo-text { font-size: 1.5rem; font-weight: bold; color: var(--main-green); }

        .user-pill {
            background: #21262d;
            padding: 5px 15px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid #30363d;
        }

        /* شبكة الشركات (نفس شكل الصورة) */
        .offers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            padding: 30px 5%;
        }

        .company-card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            position: relative;
            border: 1px solid #30363d;
            cursor: pointer;
            transition: 0.3s;
            overflow: hidden;
        }

        .company-card:hover { border-color: var(--main-green); transform: translateY(-5px); }

        .badge-bonus {
            position: absolute;
            top: 15px;
            left: 15px;
            background: #f1c40f;
            color: black;
            font-size: 0.7rem;
            font-weight: bold;
            padding: 3px 8px;
            border-radius: 10px;
        }

        .company-info {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            margin-top: 10px;
        }

        .company-name { font-size: 1.2rem; font-weight: bold; margin-bottom: 5px; }
        .company-desc { font-size: 0.8rem; color: var(--text-gray); }

        .stars { color: #f1c40f; font-size: 0.9rem; margin-top: 10px; }

        /* الأقسام الأخرى */
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 20px;
            background: #161b22;
            margin: 20px 5%;
            border-radius: 10px;
        }

        .btn-withdraw {
            background: var(--main-green);
            color: black;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        #login-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: var(--dark-bg); display: flex; justify-content: center;
            align-items: center; z-index: 9999;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div style="text-align: center;">
        <img src="0.webp" width="100" style="border-radius: 20px; margin-bottom: 20px;">
        <h2>مرحباً بك في مستر كاش</h2>
        <button onclick="googleLogin()" style="padding: 12px 25px; cursor: pointer; border-radius: 8px; font-weight: bold; background: white; color: black; border: none; display: flex; align-items: center; gap: 10px; margin: auto;">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="20">
            تسجيل الدخول بجوجل
        </button>
    </div>
</div>

<header>
    <div class="brand">
        <img src="0.webp">
        <div class="logo-text">MR. CASH</div>
    </div>
    <div id="user-area" class="hidden">
        <div class="user-pill">
            <span id="user-name">...</span>
            <img id="user-img" src="" width="30" style="border-radius: 50%;">
        </div>
    </div>
</header>

<div id="main-app" class="hidden">
    <div class="stats-bar">
        <div>نقاطك: <span id="pts" style="color: var(--main-green); font-weight: bold;">0</span></div>
        <div>رصيدك: <span id="bal" style="color: var(--main-green); font-weight: bold;">$0.00</span></div>
        <button class="btn-withdraw" onclick="alert('سيتم فتح قسم السحب قريباً')">سحب نقدي</button>
    </div>

    <h2 style="padding: 0 5%; color: var(--text-gray);">الشركات المتاحة</h2>
    
    <div class="offers-grid">
        <div class="company-card" onclick="openWall('h7mx23bis2zaib6apwwe73uv3gr92i')">
            <div class="badge-bonus">60% ✨</div>
            <img src="https://adlexy.com/favicon.ico" width="40">
            <div class="company-info">
                <span class="company-name">أدليكسي - Adlexy</span>
                <span class="company-desc">أفضل العروض والمهام السريعة</span>
                <div class="stars">★★★★★</div>
            </div>
        </div>

        <div class="company-card">
            <div class="badge-bonus">40% 🔥</div>
            <div class="company-name">Monlix</div>
            <div class="company-desc">استطلاعات رأي وعروض مميزة</div>
            <div class="stars">★★★★☆</div>
        </div>
        
        <div class="company-card">
            <div class="badge-bonus">30% ⚡</div>
            <div class="company-name">Torox</div>
            <div class="company-desc">تحميل ألعاب وتطبيقات</div>
            <div class="stars">★★★★★</div>
        </div>
    </div>
</div>

<div id="wall-modal" class="hidden" style="position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index: 10000; padding: 20px; box-sizing: border-box;">
    <button onclick="closeWall()" style="background: red; color: white; border: none; padding: 10px; cursor: pointer; margin-bottom: 10px;">إغلاق X</button>
    <iframe id="wall-iframe" src="" style="width: 100%; height: 90%; background: white; border-radius: 10px;"></iframe>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBxlADpedVvasxiwOA3ESAPv73j7feck00",
        authDomain: "mrcash-9e428.firebaseapp.com",
        projectId: "mrcash-9e428",
        storageBucket: "mrcash-9e428.firebasestorage.app",
        messagingSenderId: "537730003026",
        appId: "1:537730003026:web:82e58fd16d9ec4feaf6f8b",
        measurementId: "G-5B17ZS9YHN"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    let currentUID = "";

    function googleLogin() {
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithPopup(provider).then(res => setupUser(res.user));
    }

    async function setupUser(user) {
        currentUID = user.uid;
        document.getElementById('login-overlay').classList.add('hidden');
        document.getElementById('main-app').classList.remove('hidden');
        document.getElementById('user-area').classList.remove('hidden');
        document.getElementById('user-name').innerText = user.displayName;
        document.getElementById('user-img').src = user.photoURL;

        const userRef = db.collection('users').doc(user.uid);
        userRef.onSnapshot(snap => {
            const data = snap.data() || {points: 0};
            document.getElementById('pts').innerText = data.points;
            document.getElementById('bal').innerText = `$${(data.points / 1000).toFixed(2)}`;
        });
    }

    function openWall(apiKey) {
        document.getElementById('wall-modal').classList.remove('hidden');
        document.getElementById('wall-iframe').src = `https://adlexy.com/offerwall/${apiKey}/${currentUID}`;
    }

    function closeWall() {
        document.getElementById('wall-modal').classList.add('hidden');
        document.getElementById('wall-iframe').src = "";
    }

    auth.onAuthStateChanged(user => { if(user) setupUser(user); });
</script>

</body>
</html>
