<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MrCash | لوحة التحكم</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #00c853; --bg: #050505; --card: #111; --border: #222; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 20px; }
        
        /* الهيدر المصغر */
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .user-info img { width: 40px; border-radius: 50%; border: 2px solid var(--primary); }
        
        /* رصيد النقاط */
        .balance-card {
            background: linear-gradient(135deg, var(--primary), #007e33);
            padding: 30px; border-radius: 20px; text-align: center; margin-bottom: 30px;
            color: black; font-weight: bold;
        }
        .balance-card h1 { font-size: 3rem; margin: 10px 0; }

        /* أيقونات السحب (مثل الصورة التي أرفقتها) */
        .grid-container {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px; margin-bottom: 40px;
        }
        .draw-card {
            background: var(--card); border: 1px solid var(--border);
            padding: 20px; border-radius: 15px; text-align: center; transition: 0.3s;
        }
        .draw-card:hover { border-color: var(--primary); transform: scale(1.05); }
        .draw-card img { width: 50px; height: 50px; object-fit: contain; margin-bottom: 10px; }

        /* شركات العروض */
        .offer-section { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .offer-wall {
            background: var(--card); padding: 20px; border-radius: 15px;
            display: flex; align-items: center; justify-content: space-between;
            border: 1px solid var(--border); cursor: pointer;
        }
        .offer-wall i { font-size: 1.5rem; color: var(--primary); }
    </style>
</head>
<body>

    <header>
        <div class="logo" style="color:var(--primary); font-weight:bold; font-size:1.5rem;">MR CASH</div>
        <div class="user-info">
            <span id="user-name">تحميل...</span>
            <img id="user-pic" src="https://via.placeholder.com/40" alt="">
            <button onclick="logout()" style="background:none; border:none; color:red; cursor:pointer;"><i class="fas fa-sign-out-alt"></i></button>
        </div>
    </header>

    <div class="balance-card">
        <p>رصيدك الحالي</p>
        <h1 id="user-balance">0.00</h1>
        <span>نقطة (Points)</span>
    </div>

    <h3>طرق السحب المتاحة</h3>
    <div class="grid-container">
        <div class="draw-card"><img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/Visa_Inc._logo.svg"><div>Visa</div></div>
        <div class="draw-card"><img src="https://upload.wikimedia.org/wikipedia/commons/b/b5/PayPal.svg"><div>PayPal</div></div>
        <div class="draw-card"><img src="https://upload.wikimedia.org/wikipedia/en/2/21/Free_Fire_Logo.png"><div>Free Fire</div></div>
        <div class="draw-card"><img src="https://w7.pngwing.com/pngs/410/505/png-transparent-pubg-mobile-playerunknown-s-battlegrounds-logo-game-pubg-mobile-logo-text-orange-logo.png"><div>PUBG</div></div>
    </div>

    <h3>شركات العروض</h3>
    <div class="offer-section">
        <div class="offer-wall"><span>Lootably</span> <i class="fas fa-chevron-left"></i></div>
        <div class="offer-wall"><span>OfferToro</span> <i class="fas fa-chevron-left"></i></div>
        <div class="offer-wall"><span>AdGate</span> <i class="fas fa-chevron-left"></i></div>
        <div class="offer-wall"><span>Monlix</span> <i class="fas fa-chevron-left"></i></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // ضع إعداداتك هنا مرة أخرى
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "mrcash-app.firebaseapp.com",
            projectId: "mrcash-app",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // التأكد من أن المستخدم مسجل دخول
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('user-name').innerText = user.displayName || user.email;
                if(user.photoURL) document.getElementById('user-pic').src = user.photoURL;
                // ملاحظة: الرصيد يحتاج ربط بقاعدة بيانات Firestore لاحقاً
                document.getElementById('user-balance').innerText = "150.00"; 
            } else {
                window.location.href = "index.html"; // إذا لم يسجل دخول ارجعه للرئيسية
            }
        });

        window.logout = () => {
            signOut(auth).then(() => window.location.href = "index.html");
        }
    </script>
</body>
</html>
