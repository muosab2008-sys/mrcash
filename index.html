<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ميست كاش | كسب المال</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --primary: #2ecc71; --bg-main: #0d1117; --bg-side: #010409;
            --card: #161b22; --border: #30363d; --text: #ffffff; --text-dim: #8b949e;
        }

        * { box-sizing: border-box; }
        body { background-color: var(--bg-main); color: var(--text); font-family: 'Cairo', sans-serif; margin: 0; display: flex; }

        /* Sidebar */
        .sidebar {
            width: 280px; height: 100vh; background: var(--bg-side); border-left: 1px solid var(--border);
            position: fixed; right: 0; top: 0; padding: 20px; display: flex; flex-direction: column; z-index: 1000;
        }
        .sidebar-brand { display: flex; align-items: center; gap: 12px; margin-bottom: 30px; font-weight: 900; color: var(--primary); font-size: 1.5rem; }
        .sidebar-brand img { width: 45px; border-radius: 10px; }
        
        .nav-link { display: flex; align-items: center; gap: 12px; padding: 12px; color: var(--text); text-decoration: none; border-radius: 12px; transition: 0.3s; margin-bottom: 5px; }
        .nav-link:hover, .nav-link.active { background: var(--card); color: var(--primary); }

        /* Main Content */
        main { margin-right: 280px; width: calc(100% - 280px); padding: 30px 5%; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .balance-card { background: var(--card); padding: 10px 20px; border-radius: 50px; border: 1px solid var(--border); display: flex; gap: 20px; }

        /* Partner Cards - التصميم الجديد */
        .partners-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .partner-box { 
            background: #000; border-radius: 20px; border: 1px solid var(--border); padding: 20px; 
            position: relative; cursor: pointer; transition: 0.3s;
        }
        .partner-box:hover { border-color: var(--primary); box-shadow: 0 0 15px rgba(46, 204, 113, 0.2); }
        .partner-box .badge { 
            position: absolute; top: 15px; left: 15px; background: #6c5ce7; color: white; 
            padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: bold;
        }
        .partner-info { display: flex; align-items: center; gap: 10px; margin: 15px 0; }
        .partner-info img { width: 35px; }
        .stars { color: #f1c40f; font-size: 0.8rem; margin-top: 10px; }

        /* Avatar Modal - نافذة الأفاتار */
        #avatar-overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 6000; 
            display: none; align-items: center; justify-content: center; 
        }
        .avatar-card { 
            background: var(--card); border: 2px solid var(--primary); border-radius: 25px; 
            width: 90%; max-width: 500px; padding: 30px; text-align: center;
        }
        .avatar-grid { 
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; 
            max-height: 300px; overflow-y: auto; margin: 20px 0; padding: 10px;
        }
        .avatar-grid img { 
            width: 100%; border-radius: 50%; cursor: pointer; border: 3px solid transparent; 
        }
        .avatar-grid img.selected { border-color: var(--primary); box-shadow: 0 0 10px var(--primary); }
        
        #login-overlay { position: fixed; inset: 0; background: var(--bg-main); z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="avatar-overlay">
    <div class="avatar-card">
        <h2 style="color: var(--primary); margin-top: 0;">اختر شخصيتك</h2>
        <div class="avatar-grid" id="avatar-picker-grid"></div>
        <button id="save-avatar-btn" onclick="saveAvatar()" style="width: 100%; background: var(--primary); color: #000; padding: 12px; border: none; border-radius: 10px; font-weight: 900; cursor: pointer;">تأكيد الاختيار</button>
    </div>
</div>

<div id="login-overlay">
    <img src="0.webp" style="width: 120px; border-radius: 20px; border: 3px solid var(--primary); margin-bottom: 20px;">
    <h1>مستر كاش</h1>
    <button onclick="login()" style="background: var(--primary); color: #000; padding: 15px 40px; border: none; border-radius: 50px; font-weight: 900; cursor: pointer;"><i class="fab fa-google"></i> دخول بواسطة جوجل</button>
</div>

<aside class="sidebar">
    <div class="sidebar-brand"><img src="1.jpg"> ميست كاش</div>
    <div class="nav-link active"><i class="fas fa-coins"></i> يكسب</div>
    <a href="#" class="nav-link"><i class="fas fa-wallet"></i> سحب نقدي</a>
</aside>

<main>
    <header>
        <div>
            <h2 style="margin: 0;">رصيدك الحالي</h2>
            <p style="color: var(--text-dim);">مرحباً، <span id="u-display">...</span></p>
        </div>
        <div class="balance-card">
            <span>رصيدك: <b id="pts">0.00</b> MC</span>
        </div>
    </header>

    <h3>شركاء العرض</h3>
    <div class="partners-list">
        <div class="partner-box" onclick="openWall()">
            <div class="badge">عروض موثوقة 🤝</div>
            <div class="partner-info">
                <img src="https://gemiad.s3.eu-central-1.amazonaws.com/logos/Asset_7.png">
                <span style="font-weight: 900; font-size: 1.2rem;">GemiAd</span>
            </div>
            <div class="stars"><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i></div>
        </div>
    </div>
</main>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBxlADpedVvasxiwOA3ESAPv73j7feck00",
        authDomain: "mrcash-9e428.firebaseapp.com",
        projectId: "mrcash-9e428",
        storageBucket: "mrcash-9e428.firebasestorage.app",
        messagingSenderId: "537730003026",
        appId: "1:537730003026:web:82e58fd16d9ec4feaf6f8b"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    let currentUID = "";
    let selectedAvatar = "";

    function login() {
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithPopup(provider);
    }

    auth.onAuthStateChanged(user => {
        if(user) {
            currentUID = user.uid;
            document.getElementById('login-overlay').classList.add('hidden');
            document.getElementById('u-display').innerText = user.displayName;
            
            // التحقق من وجود أفاتار
            db.collection('users').doc(user.uid).get().then(doc => {
                if (!doc.exists || !doc.data().avatar) {
                    showAvatarPicker();
                }
            });

            db.collection('users').doc(user.uid).onSnapshot(doc => {
                const d = doc.data() || {points: 0};
                document.getElementById('pts').innerText = parseFloat(d.points).toFixed(2);
            });
        }
    });

    function showAvatarPicker() {
        const grid = document.getElementById('avatar-picker-grid');
        grid.innerHTML = '';
        for(let i=1; i<=12; i++) {
            const url = `https://api.dicebear.com/7.x/avataaars/svg?seed=${i}`;
            const img = document.createElement('img');
            img.src = url;
            img.onclick = () => {
                document.querySelectorAll('.avatar-grid img').forEach(el => el.classList.remove('selected'));
                img.classList.add('selected');
                selectedAvatar = url;
            };
            grid.appendChild(img);
        }
        document.getElementById('avatar-overlay').style.display = 'flex';
    }

    async function saveAvatar() {
        if(!selectedAvatar) return alert("الرجاء اختيار شخصية!");
        
        const btn = document.getElementById('save-avatar-btn');
        btn.innerText = "جاري الحفظ...";
        btn.disabled = true;

        try {
            await db.collection('users').doc(currentUID).set({
                avatar: selectedAvatar,
                displayName: auth.currentUser.displayName
            }, { merge: true });
            
            document.getElementById('avatar-overlay').style.display = 'none';
        } catch (e) {
            alert("خطأ في الحفظ، حاول ثانية");
            btn.innerText = "تأكيد الاختيار";
            btn.disabled = false;
        }
    }

    function openWall() {
        window.open(`https://adlexy.com/offerwall/h7mx23bis2zaib6apwwe73uv3gr92i/${currentUID}`, '_blank');
    }
</script>
</body>
</html>
