<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mr. Cash | مستر كاش - منصة الأرباح</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-pink: #ff007f;
            --bg: #050b18;
            --card: #10192d;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* الهيدر */
        header {
            width: 100%;
            padding: 15px 5%;
            background: var(--card);
            border-bottom: 2px solid var(--neon-blue);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            box-shadow: 0 0 15px var(--neon-blue);
        }

        .logo { font-size: 1.8rem; font-weight: bold; color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); }

        /* لوحة تحكم المستخدم */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            width: 90%;
            max-width: 800px;
            margin-top: 30px;
        }

        .stat-card {
            background: var(--card);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(0, 242, 255, 0.2);
            text-align: center;
        }

        .stat-card h3 { font-size: 0.8rem; color: #888; margin: 0; }
        .stat-card p { font-size: 1.5rem; font-weight: bold; color: var(--neon-blue); margin: 10px 0; }

        /* أزرار الدخول والخروج */
        .btn-google {
            background: #fff; color: #000; padding: 10px 20px; border-radius: 8px; border: none;
            font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 10px;
        }

        /* جدار العروض */
        .offerwall-container {
            width: 90%;
            max-width: 1000px;
            background: var(--card);
            margin: 30px 0;
            padding: 20px;
            border-radius: 20px;
            border: 2px dashed var(--neon-pink);
            min-height: 500px;
        }

        /* قسم السحب */
        .withdraw-section {
            width: 90%;
            max-width: 400px;
            background: #111;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 50px;
            border: 1px solid #333;
        }

        input { width: 100%; padding: 10px; margin: 10px 0; background: #000; color: #fff; border: 1px solid var(--neon-blue); border-radius: 5px; box-sizing: border-box;}
        .btn-withdraw { width: 100%; padding: 12px; background: var(--neon-blue); border: none; font-weight: bold; cursor: pointer; border-radius: 5px; }

        .hidden { display: none; }
    </style>
</head>
<body>

<header>
    <div class="logo">MR. CASH</div>
    <div id="auth-buttons">
        <button class="btn-google" onclick="login()">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="18">
            دخول بجوجل
        </button>
    </div>
</header>

<div id="main-content" class="hidden">
    <div class="dashboard">
        <div class="stat-card"><h3>نقاطك</h3><p id="user-points">0</p></div>
        <div class="stat-card"><h3>رصيدك</h3><p id="user-balance">$0.00</p></div>
        <div class="stat-card"><h3>حالة السحب</h3><p style="font-size: 0.9rem;">متاح</p></div>
    </div>

    <div class="offerwall-container">
        <h2 style="color: var(--neon-pink);">🔥 العروض المتاحة</h2>
        <div id="adlexy-wall">
            </div>
    </div>

    <div class="withdraw-section">
        <h3>💰 سحب الأرباح</h3>
        <input type="text" id="wallet-addr" placeholder="عنوان محفظة USDT (TRC-20)">
        <button class="btn-withdraw" onclick="withdraw()">طلب سحب</button>
    </div>
</div>

<script>
    // بيانات Firebase الخاصة بك (لا تقم بتغييرها)
    const firebaseConfig = {
        apiKey: "AIzaSyBxlADpedVvasxiwOA3ESAPv73j7feck00",
        authDomain: "mrcash-9e428.firebaseapp.com",
        projectId: "mrcash-9e428",
        storageBucket: "mrcash-9e428.firebasestorage.app",
        messagingSenderId: "537730003026",
        appId: "1:537730003026:web:82e58fd16d9ec4feaf6f8b",
        measurementId: "G-5B17ZS9YHN"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // وظيفة تسجيل الدخول
    function login() {
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithPopup(provider).then((result) => {
            handleUser(result.user);
        }).catch((err) => {
            alert("خطأ: يرجى التأكد من إضافة رابط الموقع في Firebase Authorized Domains");
            console.error(err);
        });
    }

    // إدارة بيانات المستخدم
    async function handleUser(user) {
        document.getElementById('auth-buttons').innerHTML = `<img src="${user.photoURL}" width="40" style="border-radius:50%; border:2px solid var(--neon-blue);">`;
        document.getElementById('main-content').classList.remove('hidden');

        const userRef = db.collection('users').doc(user.uid);
        const doc = await userRef.get();

        if (!doc.exists) {
            await userRef.set({ points: 0, balance: 0, email: user.email, name: user.displayName });
        }

        // تحديث البيانات حياً
        userRef.onSnapshot((snap) => {
            const data = snap.data();
            document.getElementById('user-points').innerText = data.points;
            document.getElementById('user-balance').innerText = `$${(data.points / 1000).toFixed(2)}`;
        });

        // تحميل جدار عروض Adlexy الخاص بك
        document.getElementById('adlexy-wall').innerHTML = `
            <iframe src="https://adlexy.com/offerwall/h7mx23bis2zaib6apwwe73uv3gr92i/${user.uid}" 
            width="100%" height="700px" frameborder="0"></iframe>
        `;
    }

    function withdraw() {
        const wallet = document.getElementById('wallet-addr').value;
        if(wallet.length < 10) return alert("يرجى إدخال عنوان محفظة صحيح!");
        alert("تم إرسال طلب السحب للمراجعة!");
    }

    // البقاء متصلاً
    auth.onAuthStateChanged((user) => { if (user) handleUser(user); });
</script>

</body>
</html>
