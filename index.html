<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mr. Cash | مستر كاش - منصة الأرباح الحقيقية</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-pink: #ff007f;
            --bg: #050b18;
            --card: #10192d;
        }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* الهيدر الاحترافي */
        header {
            padding: 15px 5%;
            background: var(--card);
            border-bottom: 2px solid var(--neon-blue);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 0 20px var(--neon-blue);
        }

        .logo {
            font-size: 2rem;
            font-weight: bold;
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue);
        }

        /* لوحة إحصائيات المستخدم */
        .user-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            padding: 20px 5%;
        }

        .stat-box {
            background: var(--card);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(0, 242, 255, 0.3);
            text-align: center;
            transition: 0.3s;
        }

        .stat-box:hover { border-color: var(--neon-pink); transform: scale(1.02); }
        .stat-box h3 { font-size: 0.8rem; color: #888; margin: 0; }
        .stat-box p { font-size: 1.6rem; font-weight: bold; color: var(--neon-blue); margin: 5px 0; }

        /* منطقة تسجيل الدخول */
        #login-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-card {
            background: var(--card);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid var(--neon-blue);
        }

        .btn-google {
            background: #fff;
            color: #000;
            padding: 12px 25px;
            border-radius: 10px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.1rem;
        }

        /* جدار العروض */
        .offers-section {
            padding: 20px 5%;
            flex: 1;
        }

        .wall-frame {
            width: 100%;
            height: 800px;
            border-radius: 15px;
            border: 2px solid var(--neon-pink);
            background: #fff;
        }

        /* قسم السحب */
        .withdraw-section {
            background: var(--card);
            margin: 20px 5%;
            padding: 25px;
            border-radius: 15px;
            border-top: 3px solid var(--neon-pink);
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #000;
            border: 1px solid var(--neon-blue);
            color: #fff;
            border-radius: 8px;
        }

        .btn-withdraw {
            width: 100%;
            padding: 15px;
            background: var(--neon-blue);
            color: #000;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<header>
    <div class="logo">MR. CASH</div>
    <div id="user-info" class="hidden">
        <img id="user-img" src="" width="35" style="border-radius:50%; border:2px solid var(--neon-blue);">
    </div>
</header>

<div id="login-screen">
    <div class="login-card">
        <h1 style="color: var(--neon-blue);">مرحباً بك في مستر كاش</h1>
        <p>سجل دخولك الآن لتبدأ بجني الأرباح من العروض</p>
        <button class="btn-google" onclick="googleLogin()">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="20">
            الدخول عبر حساب جوجل
        </button>
    </div>
</div>

<div id="main-app" class="hidden">
    <div class="user-stats">
        <div class="stat-box"><h3>النقاط المجموعة</h3><p id="pts">0</p></div>
        <div class="stat-box"><h3>الرصيد القابل للسحب</h3><p id="bal">$0.00</p></div>
        <div class="stat-box"><h3>معرف المستخدم</h3><p id="uid-display" style="font-size: 0.6rem;">---</p></div>
    </div>

    <div class="offers-section">
        <h2 style="color: var(--neon-pink); text-align: right;">🔥 عروض Adlexy المتاحة لك:</h2>
        <div id="offer-wall-container">
            </div>
    </div>

    <div class="withdraw-section">
        <h3>💰 سحب الأرباح (USDT TRC-20)</h3>
        <p style="color: #888; font-size: 0.8rem;">الحد الأدنى 5000 نقطة ($5)</p>
        <input type="text" id="wallet-address" placeholder="ضع عنوان محفظتك هنا">
        <button class="btn-withdraw" onclick="handleWithdraw()">إرسال طلب السحب</button>
    </div>
</div>

<script>
    // إعدادات Firebase الخاصة بك
    const firebaseConfig = {
        apiKey: "AIzaSyBxlADpedVvasxiwOA3ESAPv73j7feck00",
        authDomain: "mrcash-9e428.firebaseapp.com",
        projectId: "mrcash-9e428",
        storageBucket: "mrcash-9e428.firebasestorage.app",
        messagingSenderId: "537730003026",
        appId: "1:537730003026:web:82e58fd16d9ec4feaf6f8b",
        measurementId: "G-5B17ZS9YHN"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    const ADLEXY_KEY = "h7mx23bis2zaib6apwwe73uv3gr92i";

    // دالة تسجيل الدخول
    function googleLogin() {
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithPopup(provider).then((result) => {
            setupUser(result.user);
        }).catch(err => {
            alert("تأكد من إضافة 'muosab2008-sys.github.io' في Authorized Domains بـ Firebase");
        });
    }

    // إعداد حساب المستخدم
    async function setupUser(user) {
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('main-app').classList.remove('hidden');
        document.getElementById('user-info').classList.remove('hidden');
        document.getElementById('user-img').src = user.photoURL;
        document.getElementById('uid-display').innerText = user.uid;

        const userRef = db.collection('users').doc(user.uid);
        const doc = await userRef.get();

        if (!doc.exists) {
            await userRef.set({ points: 0, balance: 0, email: user.email, name: user.displayName });
        }

        // تحديث حي للبيانات من Firestore
        userRef.onSnapshot((snap) => {
            const data = snap.data();
            document.getElementById('pts').innerText = data.points || 0;
            document.getElementById('bal').innerText = `$${((data.points || 0) / 1000).toFixed(2)}`;
        });

        // تحميل جدار العروض
        document.getElementById('offer-wall-container').innerHTML = `
            <iframe class="wall-frame" src="https://adlexy.com/offerwall/${ADLEXY_KEY}/${user.uid}"></iframe>
        `;
    }

    function handleWithdraw() {
        const wallet = document.getElementById('wallet-address').value;
        if(wallet.length < 10) return alert("يرجى إدخال عنوان صحيح");
        alert("تم استلام الطلب! سيتم التحقق من نقاطك والدفع قريباً.");
    }

    // الحفاظ على الجلسة عند تحديث الصفحة
    auth.onAuthStateChanged((user) => { if (user) setupUser(user); });
</script>

</body>
</html>
