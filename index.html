<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earnly | منصة الأرباح الاحترافية</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --neon: #00ff9d;
            --dark-bg: #050505;
            --card-bg: #0f0f0f;
            --border: #1f1f1f;
            --text: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Cairo', sans-serif; background: var(--dark-bg); color: var(--text); overflow-x: hidden; }

        /* شريط السحب المتحرك - نيون */
        .scroller {
            background: #000; padding: 10px 0; border-bottom: 2px solid var(--neon);
            display: flex; gap: 20px; overflow: hidden; white-space: nowrap;
            box-shadow: 0 0 10px var(--neon);
        }
        .scroller-item {
            display: inline-flex; align-items: center; gap: 10px; background: #111;
            padding: 5px 15px; border-radius: 50px; border: 1px solid var(--border);
        }
        .scroller-item img { width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--neon); }

        /* الهيدر */
        nav { 
            padding: 20px 8%; display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100;
        }
        .logo { font-size: 2.2rem; font-weight: 900; color: var(--neon); text-decoration: none; text-shadow: 0 0 10px var(--neon); }

        /* صفحة الهبوط */
        .hero { padding: 100px 8%; text-align: center; }
        .hero h1 { font-size: 3.5rem; margin-bottom: 20px; font-weight: 900; }
        .hero span { color: var(--neon); }
        .btn-neon { 
            background: var(--neon); color: #000; padding: 15px 40px; border-radius: 12px; 
            font-weight: 900; border: none; cursor: pointer; font-size: 1.2rem;
            box-shadow: 0 0 20px var(--neon);
        }

        /* جدران العروض - الشكل المطلوب */
        .section { display: none; padding: 40px 8%; animation: fadeIn 0.4s ease; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .offer-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        .offer-card {
            background: var(--card-bg); border-radius: 20px; padding: 30px; border: 1px solid var(--border);
            position: relative; transition: 0.3s;
        }
        .offer-card:hover { border-color: var(--neon); transform: translateY(-5px); }
        .badge { position: absolute; top: 20px; left: 20px; color: var(--neon); font-size: 0.8rem; border: 1px solid var(--neon); padding: 4px 12px; border-radius: 50px; }
        .offer-name { font-size: 2rem; font-weight: 900; margin: 30px 0 10px; display: block; }
        .stars { color: #ffd700; margin-bottom: 20px; }

        /* السحب */
        .withdraw-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        .withdraw-card { background: var(--card-bg); padding: 20px; border-radius: 15px; text-align: center; border: 1px solid var(--border); cursor: pointer; }
        .withdraw-card img { width: 60px; height: 60px; margin-bottom: 10px; }
        .withdraw-card:hover { border-color: var(--neon); }

        /* لوحة التحكم الجانبية */
        .stats { background: #111; padding: 15px; border-radius: 12px; border-right: 4px solid var(--neon); margin-bottom: 30px; }
    </style>
</head>
<body>

    <div class="scroller" id="live-scroller"></div>

    <nav>
        <a href="#" class="logo">EARNLY</a>
        <div id="nav-user">
            <button class="btn-neon" onclick="login()">دخول عبر جوجل</button>
        </div>
    </nav>

    <section id="home" class="section active">
        <div class="hero">
            <h1>أهلاً بك في <span>EARNLY</span></h1>
            <p style="margin-bottom: 30px; color: #888;">المنصة الأسرع لشحن الألعاب وسحب الأموال بنظام النيون المتطور.</p>
            <button class="btn-neon" onclick="login()">ابدأ الربح الآن</button>
        </div>
    </section>

    <section id="offers" class="section">
        <div class="stats">
            <h3 id="user-name">مرحباً بك..</h3>
            <p>رصيدك الحالي: <span id="user-points" style="color: var(--neon); font-weight: 900;">0</span> نقطة</p>
        </div>

        <div class="offer-grid">
            <div class="offer-card">
                <div class="badge">موثوق</div>
                <span class="offer-name">GemiAd</span>
                <div class="stars">⭐⭐⭐⭐★</div>
                <button class="btn-neon" style="width: 100%;" onclick="openWall('https://gemiwall.com/6977536ec6ceefce12a28330/')">فتح</button>
            </div>
            <div class="offer-card">
                <div class="badge">2X POINTS</div>
                <span class="offer-name" style="color: var(--neon);">Offery</span>
                <div class="stars">⭐⭐⭐⭐⭐</div>
                <button class="btn-neon" style="width: 100%;" onclick="openWall('https://offery.io/offerwall/9tns2375b9z4y9lmz8pisa2e6vma05/')">فتح</button>
            </div>
        </div>
    </section>

    <section id="withdraw" class="section">
        <h2 style="margin-bottom: 30px; border-right: 5px solid var(--neon); padding-right: 15px;">طرق السحب المتاحة</h2>
        <div class="withdraw-grid">
            <div class="withdraw-card"><img src="https://img.icons8.com/color/96/free-fire.png"><p>Free Fire</p></div>
            <div class="withdraw-card"><img src="https://img.icons8.com/color/96/pubg.png"><p>PUBG</p></div>
            <div class="withdraw-card"><img src="https://img.icons8.com/color/96/paypal.png"><p>PayPal</p></div>
            <div class="withdraw-card"><img src="https://img.icons8.com/fluency/96/visa.png"><p>Visa</p></div>
            <div class="withdraw-card"><img src="https://faucetpay.io/static/images/favicon.png"><p>FaucetPay</p></div>
        </div>
    </section>

    <script>
        // --- إعدادات Firebase الكاملة ---
        const firebaseConfig = {
            apiKey: "AIzaSyBxlADpedVvasxiwOA3ESAPv73j7feck00",
            authDomain: "mrcash-9e428.firebaseapp.com",
            projectId: "mrcash-9e428",
            storageBucket: "mrcash-9e428.appspot.com",
            messagingSenderId: "537730003026",
            appId: "1:537730003026:web:82e58fd16d9ec4feaf6f8b"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // --- وظائف النظام ---
        function login() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).then(res => {
                const user = res.user;
                // إنشاء بروفايل في قاعدة البيانات إذا لم يوجد
                db.collection("users").doc(user.uid).set({
                    name: user.displayName,
                    email: user.email,
                    points: 0,
                    lastLogin: firebase.firestore.FieldValue.serverTimestamp()
                }, { merge: true });
            });
        }

        function showView(viewName) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(viewName).classList.add('active');
        }

        function openWall(url) {
            const uid = auth.currentUser.uid;
            window.open(url + "?uid=" + uid, "_blank");
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('nav-user').innerHTML = `
                    <button onclick="showView('offers')" style="background:none; border:none; color:white; cursor:pointer; margin-left:15px;">العروض</button>
                    <button onclick="showView('withdraw')" style="background:none; border:none; color:white; cursor:pointer; margin-left:15px;">السحب</button>
                    <img src="${user.photoURL}" onclick="auth.signOut()" style="width:40px; border-radius:50%; border:2px solid var(--neon); cursor:pointer;">
                `;
                document.getElementById('user-name').innerText = "مرحباً، " + user.displayName;
                showView('offers');

                // تحديث النقاط لحظياً من Firestore
                db.collection("users").doc(user.uid).onSnapshot(doc => {
                    if (doc.exists) document.getElementById('user-points').innerText = doc.data().points;
                });
            } else {
                showView('home');
            }
        });

        // شريط السحب الوهمي
        const names = ["Kimo", "Maro", "Samy", "Laila", "Ziad"];
        setInterval(() => {
            const n = names[Math.floor(Math.random()*names.length)];
            const p = (Math.random()*50).toFixed(2);
            const item = `<div class="scroller-item"><img src="https://i.pravatar.cc/50?u=${n}"> <span>${n} سحب $${p}</span></div>`;
            document.getElementById('live-scroller').insertAdjacentHTML('afterbegin', item);
        }, 3000);
    </script>
</body>
</html>
