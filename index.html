<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MonoSurveys - Professional Earning Platform</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --primary: #39ff14;
            --bg-deep: #080808;
            --bg-card: #121212;
            --text-main: #ffffff;
            --text-dim: #b0b0b0;
            --border: #222222;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; transition: 0.3s; }
        body { background: var(--bg-deep); color: var(--text-main); overflow-x: hidden; }

        /* Navigation */
        nav { padding: 15px 8%; display: flex; justify-content: space-between; align-items: center; background: rgba(8,8,8,0.95); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--border); backdrop-filter: blur(10px); }
        .logo { font-size: 1.6rem; font-weight: 800; color: var(--primary); text-decoration: none; }
        .btn-login { background: var(--primary); color: #000; padding: 10px 25px; border-radius: 8px; font-weight: 700; border: none; cursor: pointer; }

        /* Hero Section */
        .hero { padding: 80px 8%; text-align: center; background: radial-gradient(circle at top, #112211 0%, var(--bg-deep) 70%); }
        .hero h1 { font-size: clamp(2rem, 5vw, 4rem); font-weight: 800; margin-bottom: 20px; }
        .hero p { color: var(--text-dim); margin-bottom: 30px; font-size: 1.1rem; }

        /* Auth Modal */
        #auth-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 5000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-box { background: var(--bg-card); padding: 30px; border-radius: 20px; width: 100%; max-width: 420px; border: 1px solid var(--border); box-shadow: 0 0 30px rgba(57, 255, 20, 0.1); }
        .auth-tabs { display: flex; margin-bottom: 25px; border-bottom: 1px solid var(--border); }
        .tab { flex: 1; padding: 10px; color: var(--text-dim); cursor: pointer; text-align: center; font-weight: 600; }
        .tab.active { color: var(--primary); border-bottom: 2px solid var(--primary); }
        
        input { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid var(--border); border-radius: 8px; color: white; margin-bottom: 15px; outline: none; }
        input:focus { border-color: var(--primary); }
        
        .google-btn { width: 100%; padding: 12px; border-radius: 8px; border: none; background: white; color: black; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer; margin-top: 15px; }
        .close-modal { margin-top: 15px; display: block; color: var(--text-dim); font-size: 0.8rem; cursor: pointer; text-align: center; }

        /* Dashboard & Cards */
        .dashboard { padding: 40px 8%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; margin-top: 30px; }
        .card { background: var(--bg-card); padding: 25px; border-radius: 15px; border: 1px solid var(--border); text-align: center; }
        .card img { width: 80px; height: 80px; margin-bottom: 15px; border-radius: 12px; background: white; padding: 5px; }
        .card h3 { margin-bottom: 10px; }
        .btn-open { background: var(--primary); color: #000; width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; margin-top: 15px; }

        .hidden { display: none !important; }
        .error-msg { color: #ff4444; font-size: 0.8rem; margin-bottom: 10px; text-align: left; }
    </style>
</head>
<body>

    <div id="landing-page">
        <nav>
            <a href="#" class="logo">MonoSurveys</a>
            <button class="btn-login" onclick="openAuth('login')">Sign In</button>
        </nav>
        <section class="hero">
            <h1>Earn Money Online <br><span style="color: var(--primary);">Reliable & Secure</span></h1>
            <p>Join over 120,000 users earning daily from global surveys.</p>
            <button class="btn-login" style="padding: 15px 40px;" onclick="openAuth('signup')">Create Free Account</button>
        </section>
    </div>

    <div id="dashboard" class="hidden">
        <nav>
            <a href="#" class="logo">MonoSurveys</a>
            <div style="display:flex; align-items:center; gap:15px;">
                <span id="user-points" style="color:var(--primary); font-weight:800;">0 pts</span>
                <button class="btn-login" style="background:#ff4444; color:white; padding:5px 10px;" onclick="logout()">Logout</button>
            </div>
        </nav>
        <div class="dashboard">
            <h2>Available Offerwalls</h2>
            <div class="grid" id="offers-list"></div>
        </div>
    </div>

    <div id="auth-overlay" class="hidden">
        <div class="auth-box">
            <div class="auth-tabs">
                <div id="tab-login" class="tab" onclick="switchTab('login')">Login</div>
                <div id="tab-signup" class="tab" onclick="switchTab('signup')">Sign Up</div>
            </div>

            <div id="auth-form">
                <div id="error-container" class="error-msg hidden"></div>
                <input type="email" id="auth-email" placeholder="Email Address">
                <input type="password" id="auth-pass" placeholder="Password">
                <button id="main-auth-btn" class="btn-login" style="width:100%;" onclick="processAuth()">Continue</button>
                
                <div style="margin: 20px 0; text-align: center; color: var(--text-dim); font-size: 0.8rem;">OR</div>
                
                <button class="google-btn" onclick="loginGoogle()">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="18">
                    Continue with Google
                </button>
                
                <span class="close-modal" onclick="closeAuth()">Cancel</span>
            </div>
        </div>
    </div>

    <script>
        // --- 1. Firebase Configuration ---
        const firebaseConfig = {
            apiKey: "AIzaSyAd9KgnzExZ5RdrJVB_hpzxUvrqHiQ3jmU",
            authDomain: "mrcash-com.firebaseapp.com",
            projectId: "mrcash-com",
            storageBucket: "mrcash-com.firebasestorage.app",
            messagingSenderId: "348374269609",
            appId: "1:348374269609:web:9fed2a4f69f2c0f00ff3b8"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentTab = 'login';

        // --- 2. Auth Functions ---
        function openAuth(mode) {
            document.getElementById('auth-overlay').classList.remove('hidden');
            switchTab(mode);
        }

        function closeAuth() {
            document.getElementById('auth-overlay').classList.add('hidden');
        }

        function switchTab(mode) {
            currentTab = mode;
            document.getElementById('tab-login').classList.toggle('active', mode === 'login');
            document.getElementById('tab-signup').classList.toggle('active', mode === 'signup');
            document.getElementById('main-auth-btn').innerText = mode === 'login' ? 'Login' : 'Create Account';
            document.getElementById('error-container').classList.add('hidden');
        }

        async function processAuth() {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            const errDiv = document.getElementById('error-container');

            if (!email || !pass) {
                showError("Please fill all fields");
                return;
            }

            try {
                if (currentTab === 'login') {
                    await auth.signInWithEmailAndPassword(email, pass);
                } else {
                    await auth.createUserWithEmailAndPassword(email, pass);
                }
                closeAuth();
            } catch (error) {
                showError(error.message);
            }
        }

        async function loginGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            try {
                // تفعيل تسجيل الدخول عبر جوجل
                await auth.signInWithPopup(provider);
                closeAuth();
            } catch (error) {
                showError("Google Sign-in failed: " + error.message);
            }
        }

        function logout() {
            auth.signOut();
        }

        function showError(msg) {
            const errDiv = document.getElementById('error-container');
            errDiv.innerText = msg;
            errDiv.classList.remove('hidden');
        }

        // --- 3. UI Sync ---
        auth.onAuthStateChanged(user => {
            const landing = document.getElementById('landing-page');
            const dashboard = document.getElementById('dashboard');

            if (user) {
                landing.classList.add('hidden');
                dashboard.classList.remove('hidden');
                loadOffers(user.uid);
                
                // Real-time points update
                db.collection('users').doc(user.uid).onSnapshot(doc => {
                    const pts = doc.data()?.points || 0;
                    document.getElementById('user-points').innerText = pts + " pts";
                });
            } else {
                landing.classList.remove('hidden');
                dashboard.classList.add('hidden');
            }
        });

        function loadOffers(uid) {
            const partners = [
                { name: "Offery", img: "https://earng.net/storage/providers/x5v40jKJIoMPSNXMmiyTkK0eWIGXHPXSsAT2QRYb.png", url: "https://offery.io/offerwall/9tns2375b9z4y9lmz8pisa2e6vma05/" },
                { name: "GemiAd", img: "https://earng.net/storage/providers/5t91vghsZuzh5mBa1uDlmfpjjMH05idKJtU8VjcB.png", url: "https://gemiwall.com/6977536ec6ceefce12a28330/" },
                { name: "Adlexy", img: "https://monosuirveys.com/admin/images/file_00000000867471f49bc3179f6aa3f452.png", url: "https://adlexy.com/offerwall/h7mx23bis2zaib6apwwe73uv3gr92i/" }
            ];

            const grid = document.getElementById('offers-list');
            grid.innerHTML = partners.map(p => `
                <div class="card">
                    <img src="${p.img}">
                    <h3>${p.name}</h3>
                    <p style="color:var(--text-dim); font-size:0.8rem;">High Paying Surveys & Tasks</p>
                    <button class="btn-open" onclick="window.open('${p.url}${uid}', '_blank')">Earn Now</button>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
