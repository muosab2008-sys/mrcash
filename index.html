<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مونو كاش | MonoCash - العب واربح</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --primary: #00ffa3;
            --accent: #bcfe2d;
            --bg: #0d1117;
            --card: #161b22;
            --border: #30363d;
            --text: #ffffff;
            --text-dim: #8b949e;
            --grad: linear-gradient(135deg, #00ffa3 0%, #bcfe2d 100%);
        }

        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Cairo', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; line-height: 1.6; }

        /* Navigation */
        nav { padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; background: rgba(13, 17, 23, 0.8); backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--border); }
        .logo { font-size: 1.5rem; font-weight: 900; background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }
        .balance-badge { background: rgba(0, 255, 163, 0.1); border: 1px solid var(--primary); padding: 5px 15px; border-radius: 50px; color: var(--primary); font-weight: bold; }

        /* General UI Elements */
        .btn-main { background: var(--grad); color: #000; padding: 12px 25px; border-radius: 12px; font-weight: 800; border: none; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; }
        .btn-main:hover { transform: scale(1.05); filter: brightness(1.1); }
        
        .view { display: none; padding: 20px 5% 100px; animation: slideUp 0.4s ease; }
        .active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Grid System */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 15px; margin-top: 20px; }
        @media(min-width: 768px) { .grid { grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 25px; } }

        /* Cards */
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 20px; text-align: center; position: relative; overflow: hidden; }
        .card:hover { border-color: var(--primary); background: #1c2128; }
        .card img { width: 60px; height: 60px; border-radius: 12px; margin-bottom: 15px; object-fit: cover; }
        .card h3 { font-size: 1rem; margin-bottom: 5px; }
        .card p { font-size: 0.8rem; color: var(--text-dim); }

        /* Withdraw Categories */
        .cat-title { margin-top: 30px; font-size: 1.2rem; border-right: 4px solid var(--primary); padding-right: 10px; }

        /* Auth & Modals */
        #auth-overlay, #withdraw-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 5000; display: flex; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(5px); }
        .modal-box { background: var(--card); padding: 30px; border-radius: 25px; width: 100%; max-width: 400px; border: 1px solid var(--border); }
        input { width: 100%; padding: 14px; background: #0d1117; border: 1px solid var(--border); color: #fff; border-radius: 12px; margin-bottom: 15px; text-align: right; }
        
        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: rgba(22, 27, 34, 0.95); border: 1px solid var(--border); border-radius: 25px; display: flex; justify-content: space-around; padding: 12px; backdrop-filter: blur(10px); z-index: 2000; }
        .nav-item { color: var(--text-dim); text-decoration: none; text-align: center; font-size: 0.7rem; cursor: pointer; flex: 1; }
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 1.2rem; display: block; margin-bottom: 2px; }

        .hidden { display: none !important; }
        .tag { position: absolute; top: 10px; left: 10px; background: var(--primary); color: #000; font-size: 0.6rem; padding: 2px 8px; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <nav>
        <a href="#" class="logo">MONOCASH</a>
        <div id="nav-user" class="hidden">
            <div class="balance-badge" id="user-points">0 Pts</div>
        </div>
        <button id="login-btn" class="btn-main" onclick="openAuth('login')"><i class="fas fa-sign-in-alt"></i> دخول</button>
    </nav>

    <div id="view-home" class="view active">
        <div style="text-align: center; padding: 60px 0;">
            <h1 style="font-size: 2.5rem; line-height: 1.2;">حوّل مهاراتك في الألعاب <br><span style="color: var(--primary);">إلى أرباح حقيقية!</span></h1>
            <p style="color: var(--text-dim); margin: 20px 0;">أكمل العروض، اجمع النقاط، واشحن ألعابك المفضلة مجاناً.</p>
            <button class="btn-main" onclick="openAuth('signup')" style="padding: 15px 40px; font-size: 1.1rem;">سجل الآن وابدأ الربح</button>
        </div>
        
        <div class="grid">
            <div class="card"><i class="fas fa-gamepad fa-2x" style="color: var(--primary)"></i><h3>اشحن ألعابك</h3></div>
            <div class="card"><i class="fas fa-wallet fa-2x" style="color: var(--accent)"></i><h3>كاش فوري</h3></div>
            <div class="card"><i class="fas fa-shield-alt fa-2x" style="color: #4da6ff"></i><h3>نظام آمن</h3></div>
        </div>
    </div>

    <div id="view-earn" class="view">
        <h2 class="cat-title">جدران الحظ</h2>
        <div class="grid" id="offers-list"></div>
    </div>

    <div id="view-shop" class="view">
        <h2 class="cat-title">متجر المكافآت</h2>
        
        <h3 style="margin-top:20px; color: var(--text-dim)">🎮 شحن ألعاب</h3>
        <div class="grid" id="shop-games"></div>

        <h3 style="margin-top:30px; color: var(--text-dim)">💳 بطاقات هدايا</h3>
        <div class="grid" id="shop-cards"></div>

        <h3 style="margin-top:30px; color: var(--text-dim)">📱 كاش ومحافظ</h3>
        <div class="grid" id="shop-wallets"></div>
    </div>

    <div id="bottom-bar" class="bottom-nav hidden">
        <div class="nav-item active" onclick="showView('earn', this)"><i class="fas fa-th-large"></i>العروض</div>
        <div class="nav-item" onclick="showView('shop', this)"><i class="fas fa-shopping-cart"></i>المتجر</div>
        <div class="nav-link" onclick="auth.signOut()" style="color:#ff4d4d; font-size: 0.7rem; text-align: center; flex:1; cursor:pointer;"><i class="fas fa-power-off" style="font-size: 1.2rem; display: block;"></i>خروج</div>
    </div>

    <div id="auth-overlay" class="hidden">
        <div class="modal-box">
            <h2 id="auth-title" style="margin-bottom: 20px; text-align: center;">إنشاء حساب جديد</h2>
            <input type="email" id="email" placeholder="البريد الإلكتروني">
            <input type="password" id="pass" placeholder="كلمة المرور">
            <button class="btn-main" style="width: 100%; justify-content: center;" onclick="processAuth()">استمرار</button>
            <div style="text-align: center; margin: 15px 0; color: var(--text-dim);">أو</div>
            <button class="btn-main" style="width: 100%; background: #fff; color: #000; justify-content: center;" onclick="googleLogin()">
                <img src="https://www.google.com/favicon.ico" width="18"> دخول بواسطة جوجل
            </button>
            <p onclick="closeAuth()" style="text-align: center; margin-top: 20px; cursor: pointer; font-size: 0.9rem;">إغلاق</p>
        </div>
    </div>

    <div id="withdraw-modal" class="hidden">
        <div class="modal-box">
            <h2 id="wd-title">سحب الأرباح</h2>
            <p id="wd-desc" style="font-size: 0.8rem; color: var(--text-dim); margin-bottom: 15px;"></p>
            <input type="text" id="wd-input" placeholder="رقم الهاتف أو الـ ID">
            <button class="btn-main" style="width: 100%; justify-content: center;" onclick="submitWD()">تأكيد الطلب</button>
            <p onclick="closeWD()" style="text-align: center; margin-top: 20px; cursor: pointer;">إلغاء</p>
        </div>
    </div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyAd9KgnzExZ5RdrJVB_hpzxUvrqHiQ3jmU",
            authDomain: "mrcash-com.firebaseapp.com",
            projectId: "mrcash-com",
            storageBucket: "mrcash-com.firebasestorage.app",
            messagingSenderId: "348374269609",
            appId: "1:348374269609:web:9fed2a4f69f2c0f00ff3b8"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentMode = 'signup';
        let currentPoints = 0;
        let selectedItem = "";

        // UI Functions
        function openAuth(m) {
            currentMode = m;
            document.getElementById('auth-title').innerText = m === 'login' ? 'تسجيل الدخول' : 'إنشاء حساب جديد';
            document.getElementById('auth-overlay').classList.remove('hidden');
        }
        function closeAuth() { document.getElementById('auth-overlay').classList.add('hidden'); }
        
        function showView(v, el) {
            document.querySelectorAll('.view').forEach(e => e.classList.remove('active'));
            document.getElementById('view-' + v).classList.add('active');
            if(el) {
                document.querySelectorAll('.nav-item').forEach(e => e.classList.remove('active'));
                el.classList.add('active');
            }
        }

        async function processAuth() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            try {
                if(currentMode === 'login') await auth.signInWithEmailAndPassword(e, p);
                else await auth.createUserWithEmailAndPassword(e, p);
                closeAuth();
            } catch(err) { alert(err.message); }
        }

        async function googleLogin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            try { await auth.signInWithPopup(provider); closeAuth(); } catch(err) { alert(err.message); }
        }

        // Logic & Data
        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('view-home').classList.remove('active');
                document.getElementById('nav-user').classList.remove('hidden');
                document.getElementById('bottom-bar').classList.remove('hidden');
                document.getElementById('login-btn').classList.add('hidden');
                showView('earn');
                loadDashboard(user.uid);
            } else {
                showView('home');
                document.getElementById('nav-user').classList.add('hidden');
                document.getElementById('bottom-bar').classList.add('hidden');
                document.getElementById('login-btn').classList.remove('hidden');
            }
        });

        function loadDashboard(uid) {
            // مزامنة النقاط
            db.collection('users').doc(uid).onSnapshot(doc => {
                currentPoints = doc.data()?.points || 0;
                document.getElementById('user-points').innerText = currentPoints + " Pts";
            });

            // قائمة العروض
            const offers = [
                { n: "شركة Offery", i: "https://earng.net/storage/providers/x5v40jKJIoMPSNXMmiyTkK0eWIGXHPXSsAT2QRYb.png", u: "https://offery.io/offerwall/9tns2375b9z4y9lmz8pisa2e6vma05/" },
                { n: "شركة GemiAd", i: "https://earng.net/storage/providers/5t91vghsZuzh5mBa1uDlmfpjjMH05idKJtU8VjcB.png", u: "https://gemiwall.com/6977536ec6ceefce12a28330/" },
                { n: "شركة Adlexy", i: "https://monosuirveys.com/admin/images/file_00000000867471f49bc3179f6aa3f452.png", u: "https://adlexy.com/offerwall/h7mx23bis2zaib6apwwe73uv3gr92i/" }
            ];
            document.getElementById('offers-list').innerHTML = offers.map(o => `
                <div class="card">
                    <span class="tag">UP TO 5K</span>
                    <img src="${o.i}">
                    <h3>${o.n}</h3>
                    <button class="btn-main" style="width:100%; margin-top:10px;" onclick="window.open('${o.u}${uid}', '_blank')">بدأ</button>
                </div>
            `).join('');

            // متجر السحب
            const games = [
                { n: "Free Fire (100💎)", i: "https://upload.wikimedia.org/wikipedia/en/c/c2/Garena_Free_Fire_logo.png", p: 1500 },
                { n: "PUBG Mobile (60 UC)", i: "https://upload.wikimedia.org/wikipedia/en/a/ad/Pubg_mobile_logo.png", p: 2000 },
                { n: "Roblox (Robux)", i: "https://upload.wikimedia.org/wikipedia/commons/3/3a/Roblox_player_icon_black.svg", p: 2500 }
            ];
            const cards = [
                { n: "Google Play ($5)", i: "https://upload.wikimedia.org/wikipedia/commons/d/d0/Google_Play_Arrow_logo.svg", p: 5000 },
                { n: "Amazon Gift ($10)", i: "https://upload.wikimedia.org/wikipedia/commons/4/4a/Amazon_icon.svg", p: 10000 },
                { n: "Steam Card", i: "https://upload.wikimedia.org/wikipedia/commons/8/83/Steam_icon_logo.svg", p: 5000 }
            ];
            const wallets = [
                { n: "Vodafone Cash", i: "https://upload.wikimedia.org/wikipedia/commons/a/af/Vodafone_Logo.svg", p: 3000 },
                { n: "USDT (TRC20)", i: "https://cryptologos.cc/logos/tether-usdt-logo.png", p: 5000 },
                { n: "PayPal Cash", i: "https://upload.wikimedia.org/wikipedia/commons/b/b5/PayPal.svg", p: 5000 }
            ];

            const mapItem = item => `
                <div class="card" onclick="openWD('${item.n}', ${item.p})">
                    <img src="${item.i}">
                    <h3>${item.n}</h3>
                    <p>${item.p} Pts</p>
                </div>
            `;
            document.getElementById('shop-games').innerHTML = games.map(mapItem).join('');
            document.getElementById('shop-cards').innerHTML = cards.map(mapItem).join('');
            document.getElementById('shop-wallets').innerHTML = wallets.map(mapItem).join('');
        }

        function openWD(name, price) {
            selectedItem = { name, price };
            document.getElementById('wd-title').innerText = "سحب " + name;
            document.getElementById('wd-desc').innerText = `تحتاج إلى ${price} نقطة لإتمام العملية.`;
            document.getElementById('withdraw-modal').classList.remove('hidden');
        }
        function closeWD() { document.getElementById('withdraw-modal').classList.add('hidden'); }

        async function submitWD() {
            const input = document.getElementById('wd-input').value;
            if(!input) return alert("يرجى إدخال البيانات المطلوبة");
            if(currentPoints < selectedItem.price) return alert("نقاطك غير كافية");

            try {
                await db.collection('withdrawals').add({
                    uid: auth.currentUser.uid,
                    item: selectedItem.name,
                    account: input,
                    status: 'pending',
                    date: new Date()
                });
                await db.collection('users').doc(auth.currentUser.uid).update({
                    points: currentPoints - selectedItem.price
                });
                alert("تم إرسال طلب السحب بنجاح!");
                closeWD();
            } catch(e) { alert(e.message); }
        }
    </script>
</body>
</html>
