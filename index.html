<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MrCash | الصفحة الرئيسية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        :root { --primary: #00ff6a; --bg: #000; --card: #111; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: var(--bg); color: white; }

        /* واجهة الزوار */
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; }
        .hero h1 { font-size: 3rem; font-weight: 900; margin-bottom: 20px; }
        .hero h1 span { color: var(--primary); }
        .btn-main { background: var(--primary); color: black; padding: 15px 40px; border-radius: 50px; font-weight: bold; border: none; cursor: pointer; font-size: 1.2rem; }

        /* نافذة التسجيل (Modal) */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-card { background: var(--card); padding: 30px; border-radius: 25px; border: 1px solid #222; width: 90%; max-width: 400px; text-align: center; }
        
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #333; background: #000; color: white; text-align: center; }
        .btn-login { width: 100%; padding: 12px; background: var(--primary); color: black; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        .divider { margin: 20px 0; color: #444; font-size: 0.8rem; }
        .google-btn { background: white; color: black; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
    </style>
</head>
<body>

    <section class="hero" id="hero-section">
        <h1>مرحباً بك في <span>MR CASH</span></h1>
        <p style="color:#888; margin-bottom: 30px;">أفضل منصة لربح المكافآت عبر إكمال العروض.</p>
        <button class="btn-main" onclick="toggleModal()">سجل دخولك الآن</button>
    </section>

    <div class="modal" id="loginModal">
        <div class="modal-card">
            <h2 style="margin-bottom: 15px;">تسجيل الدخول</h2>
            
            <input type="email" id="email" placeholder="البريد الإلكتروني">
            <input type="password" id="pass" placeholder="كلمة المرور">
            <button class="btn-login" onclick="emailLogin()">دخول / إنشاء حساب</button>

            <div class="divider">أو عبر</div>

            <div class="google-btn" onclick="googleLogin()">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="20">
                متابعة باستخدام Google
            </div>

            <p style="margin-top: 20px; color:#555; cursor:pointer;" onclick="toggleModal()">إغلاق</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // إعداداتك الأصلية
        const firebaseConfig = {
            apiKey: "AIzaSyAd9KgnzExZ5RdrJVB_hpzxUvrqHiQ3jmU",
            authDomain: "mrcash-com.firebaseapp.com",
            projectId: "mrcash-com",
            appId: "1:348374269609:web:9fed2a4f69f2c0f00ff3b8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        window.toggleModal = () => {
            const m = document.getElementById('loginModal');
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        };

        // تسجيل جوجل
        window.googleLogin = async () => {
            try {
                await signInWithPopup(auth, provider);
                window.location.href = "dashboard.html";
            } catch (error) {
                alert("خطأ في جوجل: " + error.message);
            }
        };

        // تسجيل البريد
        window.emailLogin = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            if(!email || !pass) return alert("املاً البيانات");

            try {
                // محاولة تسجيل دخول، إذا لم يوجد حساب يتم إنشاؤه
                await signInWithEmailAndPassword(auth, email, pass);
                window.location.href = "dashboard.html";
            } catch (err) {
                if(err.code === 'auth/user-not-found') {
                    await createUserWithEmailAndPassword(auth, email, pass);
                    window.location.href = "dashboard.html";
                } else {
                    alert("خطأ: " + err.message);
                }
            }
        };
    </script>
</body>
</html>
