<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ميست كاش | MIST CASH</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --primary: #00ff9d; 
            --primary-glow: rgba(0, 255, 157, 0.3);
            --bg-dark: #0a0c10;
            --card-dark: #0d1117;
            --border: #21262d;
            --text-main: #ffffff;
            --text-muted: #8b949e;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; transition: 0.3s ease; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--bg-dark); color: var(--text-main); line-height: 1.6; overflow-x: hidden; }

        /* الأقسام وتنسيق الصفحة */
        .view-section { display: none; padding: 40px 5%; animation: fadeIn 0.5s ease; }
        .view-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* تصميم بطاقات شركات العروض الجديد (مطابق للصورة) */
        .partners-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 30px; }
        .partner-card {
            background: #000; border-radius: 25px; border: 1px solid var(--border);
            padding: 25px; position: relative; cursor: pointer; overflow: hidden;
            display: flex; flex-direction: column; justify-content: space-between; min-height: 180px;
        }
        .partner-card:hover { border-color: var(--primary); box-shadow: 0 0 20px var(--primary-glow); transform: translateY(-5px); }
        
        /* الشارات العلوية */
        .badge-top {
            position: absolute; top: 15px; left: 15px; background: #6c5ce7; 
            padding: 5px 15px; border-radius: 20px; font-size: 0.75rem; font-weight: bold;
            display: flex; align-items: center; gap: 5px; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .badge-top.green { background: #00b894; }

        .partner-logo-area { display: flex; align-items: center; margin-top: 20px; }
        .partner-logo-area img { height: 40px; margin-left: 10px; }
        .partner-name { font-size: 1.8rem; font-weight: 900; letter-spacing: -1px; }

        .partner-footer { display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
        .stars { color: #f1c40f; font-size: 0.8rem; }
        .btn-action { 
            background: #3498db; color: white; padding: 6px 18px; 
            border-radius: 20px; font-size: 0.8rem; font-weight: bold; border: none;
        }

        /* نافذة الأفاتار */
        #avatar-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 5000;
            display: none; align-items: center; justify-content: center; padding: 20px;
        }
        .avatar-box { background: var(--card-dark); width: 100%; max-width: 500px; padding: 30px; border-radius: 25px; border: 2px solid var(--primary); text-align: center; }
        .avatar-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 10px; max-height: 300px; overflow-y: auto; margin: 20px 0; padding: 10px; }
        .avatar-grid img { width: 80px; border-radius: 50%; border: 3px solid transparent; cursor: pointer; background: #1a1d24; }
        .avatar-grid img.selected { border-color: var(--primary); box-shadow: 0 0 15px var(--primary); }

        .btn-neon { background: var(--primary); color: #000; padding: 12px 30px; border-radius: 12px; font-weight: 900; border: none; cursor: pointer; width: 100%; }
        .btn-neon:disabled { background: #444; color: #888; cursor: not-allowed; }

        nav { background: #000; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
        .logo { display: flex; align-items: center; gap: 10px; color: var(--primary); text-decoration: none; font-weight: 900; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div id="avatar-modal">
        <div class="avatar-box">
            <h2 style="color: var(--primary);">اختر شخصيتك</h2>
            <div class="avatar-grid" id="avatar-list"></div>
            <button class="btn-neon" id="confirm-btn" onclick="saveAvatar()">تأكيد الاختيار</button>
        </div>
    </div>

    <nav>
        <a href="#" class="logo"><img src="1.jpg" style="width: 35px; border-radius: 8px;"> MIST CASH</a>
        <div id="nav-links"></div>
    </nav>

    <section id="view-offers" class="view-section active">
        <h2 style="margin-bottom: 10px;">شركاء <span style="color: var(--primary);">العروض</span></h2>
        <div class="partners-grid">
            
            <div class="partner-card" onclick="openWall('GemiAd', 'https://gemiwall.com/6977536ec6ceefce12a28330/')">
                <div class="badge-top">🤝 عروض موثوقة</div>
                <div class="partner-logo-area">
                    <img src="https://gemiad.s3.eu-central-1.amazonaws.com/logos/Asset_7.png">
                    <span class="partner-name">GemiAd</span>
                </div>
                <div class="partner-footer">
                    <div>
                        <p style="font-size: 0.7rem; color: var(--text-muted);">انضِمام</p>
                        <div class="stars"><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star-half-alt"></i></div>
                    </div>
                    <button class="btn-action">btn-Avatar-btn</button>
                </div>
            </div>

            <div class="partner-card" onclick="openWall('Offery', 'https://offery.io/offerwall/9tns2375b9z4y9lmz8pisa2e6vma05/')">
                <div class="badge-top green">2X 🏅</div>
                <div class="partner-logo-area">
                    <span class="partner-name" style="color: #00f2ff;">Offery</span>
                </div>
                <div class="partner-footer">
                    <div>
                        <p style="font-size: 0.7rem; color: var(--text-muted);">عرض</p>
                        <div class="stars"><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i></div>
                    </div>
                    <button class="btn-action" style="background: #2980b9;">confirmear-btn</button>
                </div>
            </div>

        </div>
    </section>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBxlADpedVvasxiwOA3ESAPv73j7feck00",
            authDomain: "mrcash-9e428.firebaseapp.com",
            projectId: "mrcash-9e428",
            storageBucket: "mrcash-9e428.firebasestorage.app",
            messagingSenderId: "537730003026",
            appId: "1:537730003026:web:82e58fd16d9ec4feaf6f8b"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        let selectedUrl = "";

        // توليد الأفاتارات
        function loadAvatars() {
            const list = document.getElementById('avatar-list');
            list.innerHTML = '';
            for(let i=1; i<=20; i++) {
                const url = `https://api.dicebear.com/7.x/avataaars/svg?seed=mist${i}${Math.random()}`;
                const img = document.createElement('img');
                img.src = url;
                img.onclick = function() {
                    document.querySelectorAll('.avatar-grid img').forEach(el => el.classList.remove('selected'));
                    this.classList.add('selected');
                    selectedUrl = url;
                };
                list.appendChild(img);
            }
        }

        // حفظ الأفاتار مع حل مشكلة التعليق
        function saveAvatar() {
            if(!selectedUrl) { alert("اختر صورة!"); return; }
            
            const btn = document.getElementById('confirm-btn');
            btn.innerText = "جاري الحفظ...";
            btn.disabled = true;

            const user = auth.currentUser;
            
            // استخدام doc().set مع merge لضمان الحفظ السريع
            db.collection('users').doc(user.uid).set({
                avatar: selectedUrl,
                lastLogin: new Date()
            }, { merge: true })
            .then(() => {
                document.getElementById('avatar-modal').style.display = 'none';
                console.log("تم الحفظ بنجاح");
            })
            .catch(err => {
                console.error(err);
                alert("خطأ في الاتصال، حاول مجدداً");
                btn.disabled = false;
                btn.innerText = "تأكيد الاختيار";
            });
        }

        auth.onAuthStateChanged(user => {
            if(user) {
                db.collection('users').doc(user.uid).onSnapshot(doc => {
                    const data = doc.data() || {};
                    if(!data.avatar) {
                        loadAvatars();
                        document.getElementById('avatar-modal').style.display = 'flex';
                    }
                });
            } else {
                const provider = new firebase.auth.GoogleAuthProvider();
                auth.signInWithPopup(provider);
            }
        });

        function openWall(name, url) {
            alert("سيتم فتح جدار: " + name);
            window.open(url + auth.currentUser.uid, '_blank');
        }
    </script>
</body>
</html>
