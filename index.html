<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MrCash | النسخة الشاملة</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --primary: #00ff9d;
            --gold: #f1c40f;
            --bg: #0a0c10;
            --card: #161b22;
            --border: #30363d;
            --text: #ffffff;
            --nav-height: 70px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background-color: var(--bg); color: var(--text); line-height: 1.6; }

        /* Navigation Top */
        nav {
            height: 70px; display: flex; align-items: center; justify-content: space-between;
            padding: 0 5%; background: rgba(10, 12, 16, 0.95); backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 2000; border-bottom: 1px solid var(--border);
        }
        .logo { font-size: 1.6rem; font-weight: 900; color: var(--primary); text-decoration: none; }
        .logo span { color: #fff; }

        /* Main Container */
        .view { display: none; padding: 20px 5%; padding-bottom: 100px; animation: fadeIn 0.4s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Buttons */
        .btn-main { background: var(--primary); color: #000; padding: 10px 25px; border-radius: 10px; font-weight: bold; border: none; cursor: pointer; transition: 0.3s; }
        .btn-main:hover { transform: scale(1.05); filter: brightness(1.1); }
        .btn-google { background: #fff; color: #000; width: 100%; padding: 12px; border-radius: 10px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 15px; border: none; cursor: pointer; }

        /* Grid System */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; margin-top: 30px; }
        .card { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid var(--border); text-align: center; position: relative; }
        .card img { width: 70px; height: 70px; margin-bottom: 15px; border-radius: 12px; object-fit: contain; }
        .card h4 { margin-bottom: 10px; font-size: 1.2rem; }

        /* Bottom Navigation (Fixed & Solid) */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; background: #000; 
            border-top: 1px solid var(--border); display: flex; justify-content: space-around; 
            padding: 12px 0; z-index: 3000;
        }
        .nav-item { color: #8b949e; text-align: center; cursor: pointer; text-decoration: none; font-size: 0.8rem; }
        .nav-item.active { color: var(--primary); }
        .nav-item i { display: block; font-size: 1.4rem; margin-bottom: 4px; }

        /* Modal Auth */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 5000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--card); width: 100%; max-width: 420px; padding: 35px; border-radius: 25px; border: 1px solid var(--border); }
        .input-box { width: 100%; padding: 14px; background: #000; border: 1px solid var(--border); color: #fff; border-radius: 12px; margin-bottom: 15px; outline: none; font-size: 1rem; }
        .input-box:focus { border-color: var(--primary); }

        .hidden { display: none !important; }
        .gold-text { color: var(--gold); font-weight: bold; }
    </style>
</head>
<body>

    <nav>
        <a href="#" class="logo">MR<span>CASH</span></a>
        <div id="nav-actions">
            <button class="btn-main" id="btn-open-auth" onclick="openAuth('login')">تسجيل الدخول</button>
            <div id="user-info-nav" class="hidden">
                <span id="nav-pts" class="gold-text">0 PTS</span>
                <img id="nav-avatar" src="" style="width: 38px; border-radius: 50%; border: 2px solid var(--primary); margin-right: 10px; vertical-align: middle;">
            </div>
        </div>
    </nav>

    <main>
        <div id="view-home" class="view active">
            <div style="text-align: center; padding: 60px 0;">
                <h1 style="font-size: 2.5rem; margin-bottom: 20px;">حول وقتك إلى <span>أرباح حقيقية</span></h1>
                <p style="color: #8b949e; max-width: 600px; margin: 0 auto;">انضم لأكثر من 50,000 مستخدم يربحون يومياً عبر إتمام المهام البسيطة وسحب الجوائز.</p>
                <button class="btn-main" style="margin-top: 30px; padding: 15px 50px;" onclick="openAuth('signup')">اشترك مجاناً الآن</button>
            </div>
        </div>

        <div id="view-earn" class="view">
            <h2 style="border-right: 4px solid var(--primary); padding-right: 15px;">جدران العروض المتاحة</h2>
            <div class="grid" id="walls-list"></div>
        </div>

        <div id="view-shop" class="view">
            <h2 style="border-right: 4px solid var(--primary); padding-right: 15px;">مركز السحب والمكافآت</h2>
            <div class="grid" id="shop-list"></div>
        </div>

        <div id="view-account" class="view">
            <div class="card" style="max-width: 550px; margin: 0 auto; text-align: right;">
                <div style="text-align: center; margin-bottom: 20px;">
                    <img id="acc-img" src="" style="width: 100px; height: 100px; border-radius: 50%;">
                    <h2 id="acc-name" style="margin-top:10px;">-</h2>
                </div>
                <div style="background: #000; padding: 20px; border-radius: 15px; margin-bottom: 20px;">
                    <p>البريد: <span id="acc-email">-</span></p>
                    <p style="margin-top: 10px;">إجمالي النقاط: <span id="acc-pts" class="gold-text">0 PTS</span></p>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <button class="btn-main" style="background: #333; color: #fff;" onclick="resetPassword()">تغيير كلمة السر</button>
                    <button class="btn-main" style="background: #333; color: #fff;" onclick="updateEmailPrompt()">تحديث البريد</button>
                </div>
                <button class="btn-main" style="width:100%; margin-top:15px; background: #e74c3c; color: #fff;" onclick="auth.signOut()">تسجيل الخروج الآمن</button>
            </div>
        </div>
    </main>

    <div id="auth-modal" class="modal hidden">
        <div class="modal-content">
            <h2 id="auth-title" style="text-align: center; margin-bottom: 25px;">تسجيل الدخول</h2>
            
            <button class="btn-google" onclick="loginWithGoogle()">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="20">
                المتابعة باستخدام جوجل
            </button>

            <div style="text-align: center; margin: 15px 0; color: #555;">أو الطريقة اليدوية</div>
            <div id="auth-error" style="color: #ff4444; font-size: 0.85rem; text-align: center; margin-bottom: 10px;"></div>

            <div id="signup-only" class="hidden">
                <input type="text" id="in-name" class="input-box" placeholder="اسم المستخدم">
            </div>
            <input type="email" id="in-email" class="input-box" placeholder="البريد الإلكتروني">
            <input type="password" id="in-pass" class="input-box" placeholder="كلمة المرور">
            
            <button class="btn-main" style="width:100%; padding: 15px;" onclick="handleAuth()">دخول للحساب</button>
            
            <p style="text-align: center; margin-top: 20px; font-size: 0.9rem;">
                <span id="switch-text">ليس لديك حساب؟</span>
                <span style="color: var(--primary); cursor: pointer; font-weight: bold;" onclick="toggleAuth()">اضغط هنا</span>
            </p>
            <p style="text-align: center; margin-top: 15px; color: #8b949e; cursor: pointer; font-size: 0.8rem;" onclick="closeAuth()">إغلاق النافذة</p>
        </div>
    </div>

    <div id="bottom-bar" class="bottom-nav hidden">
        <div class="nav-item active" onclick="showView('earn', this)"><i class="fas fa-tasks"></i>العروض</div>
        <div class="nav-item" onclick="showView('shop', this)"><i class="fas fa-wallet"></i>المتجر</div>
        <div class="nav-item" onclick="showView('account', this)"><i class="fas fa-user-circle"></i>حسابي</div>
    </div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyAd9KgnzExZ5RdrJVB_hpzxUvrqHiQ3jmU",
            authDomain: "mrcash-com.firebaseapp.com",
            projectId: "mrcash-com",
            storageBucket: "mrcash-com.firebasestorage.app",
            messagingSenderId: "348374269609",
            appId: "1:348374269609:web:9fed2a4f69f2c0f00ff3b8"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentAuthMode = 'login';
        let userPoints = 0;

        // --- Auth Logic ---
        function openAuth(mode) {
            currentAuthMode = mode;
            document.getElementById('auth-title').innerText = mode === 'login' ? 'تسجيل الدخول' : 'إنشاء حساب جديد';
            document.getElementById('signup-only').classList.toggle('hidden', mode === 'login');
            document.getElementById('auth-modal').classList.remove('hidden');
        }

        function closeAuth() { document.getElementById('auth-modal').classList.add('hidden'); }
        
        function toggleAuth() {
            openAuth(currentAuthMode === 'login' ? 'signup' : 'login');
        }

        async function loginWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            try {
                const res = await auth.signInWithPopup(provider);
                const user = res.user;
                const doc = await db.collection('users').doc(user.uid).get();
                if(!doc.exists) {
                    await db.collection('users').doc(user.uid).set({
                        username: user.displayName, email: user.email, points: 0, joined: new Date().toLocaleDateString()
                    });
                }
                closeAuth();
            } catch(e) { alert(e.message); }
        }

        async function handleAuth() {
            const email = document.getElementById('in-email').value;
            const pass = document.getElementById('in-pass').value;
            const name = document.getElementById('in-name').value;
            const err = document.getElementById('auth-error');
            try {
                if(currentAuthMode === 'signup') {
                    if(!name) throw new Error("يرجى كتابة اسم المستخدم");
                    const res = await auth.createUserWithEmailAndPassword(email, pass);
                    await db.collection('users').doc(res.user.uid).set({
                        username: name, email: email, points: 0, joined: new Date().toLocaleDateString()
                    });
                } else {
                    await auth.signInWithEmailAndPassword(email, pass);
                }
                closeAuth();
            } catch(e) { err.innerText = e.message; }
        }

        async function resetPassword() {
            const email = auth.currentUser ? auth.currentUser.email : prompt("أدخل بريدك الإلكتروني:");
            if(email) {
                await auth.sendPasswordResetEmail(email);
                alert("تم إرسال رابط استعادة كلمة السر لبريدك الإلكتروني.");
            }
        }

        async function updateEmailPrompt() {
            const newMail = prompt("أدخل البريد الإلكتروني الجديد:");
            if(newMail) {
                try {
                    await auth.currentUser.updateEmail(newMail);
                    await db.collection('users').doc(auth.currentUser.uid).update({ email: newMail });
                    alert("تم تحديث البريد بنجاح.");
                } catch(e) { alert(e.message); }
            }
        }

        // --- Data Handling ---
        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('btn-open-auth').classList.add('hidden');
                document.getElementById('user-info-nav').classList.remove('hidden');
                document.getElementById('bottom-bar').classList.remove('hidden');
                document.getElementById('nav-avatar').src = user.photoURL || 'https://via.placeholder.com/40';
                showView('earn');
                syncUserData(user.uid);
            } else {
                document.getElementById('btn-open-auth').classList.remove('hidden');
                document.getElementById('user-info-nav').classList.add('hidden');
                document.getElementById('bottom-bar').classList.add('hidden');
                showView('home');
            }
        });

        function syncUserData(uid) {
            db.collection('users').doc(uid).onSnapshot(doc => {
                const data = doc.data();
                if(data) {
                    userPoints = data.points;
                    document.getElementById('nav-pts').innerText = data.points + " PTS";
                    document.getElementById('acc-pts').innerText = data.points + " PTS";
                    document.getElementById('acc-name').innerText = data.username;
                    document.getElementById('acc-email').innerText = data.email;
                    document.getElementById('acc-img').src = auth.currentUser.photoURL || 'https://via.placeholder.com/100';
                }
            });
            renderWalls(uid);
            renderShop();
        }

        function showView(viewId, el) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById('view-' + viewId).classList.add('active');
            if(el) {
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                el.classList.add('active');
            }
            window.scrollTo(0,0);
        }

        function renderWalls(uid) {
            const walls = [
                { n: "Offery Wall", i: "https://earng.net/storage/providers/x5v40jKJIoMPSNXMmiyTkK0eWIGXHPXSsAT2QRYb.png", u: "https://offery.io/offerwall/9tns2375b9z4y9lmz8pisa2e6vma05/" },
                { n: "GemiAd Wall", i: "https://earng.net/storage/providers/5t91vghsZuzh5mBa1uDlmfpjjMH05idKJtU8VjcB.png", u: "https://gemiwall.com/6977536ec6ceefce12a28330/" },
                { n: "Adlexy Wall", i: "https://monosuirveys.com/admin/images/file_00000000867471f49bc3179f6aa3f452.png", u: "https://adlexy.com/offerwall/h7mx23bis2zaib6apwwe73uv3gr92i/" }
            ];
            document.getElementById('walls-list').innerHTML = walls.map(w => `
                <div class="card">
                    <img src="${w.i}"><h4>${w.n}</h4>
                    <button class="btn-main" style="width:100%" onclick="window.open('${w.u}${uid}', '_blank')">فتح المهام</button>
                </div>
            `).join('');
        }

        function renderShop() {
            const items = [
                { n: "فودافون كاش", i: "https://upload.wikimedia.org/wikipedia/commons/a/af/Vodafone_Logo.svg", p: 1500, label: "رقم المحفظة" },
                { n: "باير (Payeer)", i: "https://www.payeer.com/favicon.ico", p: 1000, label: "رقم المحفظة (P123...)" },
                { n: "USDT (TRC20)", i: "https://cryptologos.cc/logos/tether-usdt-logo.png", p: 3000, label: "عنوان TRC20" },
                { n: "بايبال (PayPal)", i: "https://upload.wikimedia.org/wikipedia/commons/b/b5/PayPal.svg", p: 5000, label: "البريد الإلكتروني" },
                { n: "شدات ببجي", i: "https://upload.wikimedia.org/wikipedia/en/a/ad/Pubg_mobile_logo.png", p: 1800, label: "الأيدي (ID)" },
                { n: "جواهر فري فاير", i: "https://upload.wikimedia.org/wikipedia/en/c/c2/Garena_Free_Fire_logo.png", p: 1200, label: "الأيدي (ID)" },
                { n: "جوجل بلاي 5$", i: "https://upload.wikimedia.org/wikipedia/commons/d/d0/Google_Play_Arrow_logo.svg", p: 5000, label: "بريد استلام الكود" }
            ];
            document.getElementById('shop-list').innerHTML = items.map(item => `
                <div class="card">
                    <img src="${item.i}"><h4>${item.n}</h4>
                    <p class="gold-text">${item.p} PTS</p>
                    <button class="btn-main" style="width:100%; margin-top:10px; background:#222; color:#fff;" onclick="withdraw('${item.n}', ${item.p}, '${item.label}')">سحب الآن</button>
                </div>
            `).join('');
        }

        async function withdraw(name, price, label) {
            if(userPoints < price) return alert("نقاطك غير كافية لهذا السحب.");
            const info = prompt(`للسحب لـ ${name}، يرجى إدخال ${label}:`);
            if(info) {
                try {
                    await db.collection('withdrawals').add({
                        uid: auth.currentUser.uid, user: auth.currentUser.displayName || "User",
                        item: name, amount: price, account: info, status: 'pending', date: new Date().toLocaleString()
                    });
                    await db.collection('users').doc(auth.currentUser.uid).update({ points: userPoints - price });
                    alert("تم إرسال طلب السحب بنجاح! سيصلك خلال 24 ساعة.");
                } catch(e) { alert(e.message); }
            }
        }
    </script>
</body>
</html>
