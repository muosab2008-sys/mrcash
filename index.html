<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MrCash | اربح المال بسهولة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        :root { --primary: #00ff6a; --bg: #000; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: var(--bg); color: white; overflow: hidden; }

        /* تأثير الخلفية */
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; background: radial-gradient(circle at center, #111 0%, #000 100%); }
        .hero h1 { font-size: 3.5rem; font-weight: 900; margin-bottom: 10px; line-height: 1.2; }
        .hero h1 span { color: var(--primary); }
        .hero p { color: #888; font-size: 1.2rem; max-width: 500px; margin-bottom: 30px; }

        .btn-start { background: var(--primary); color: black; padding: 15px 40px; border-radius: 50px; font-weight: bold; border: none; cursor: pointer; font-size: 1.2rem; box-shadow: 0 0 20px rgba(0, 255, 106, 0.4); transition: 0.3s; }
        .btn-start:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(0, 255, 106, 0.6); }

        /* نافذة التسجيل */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 100; backdrop-filter: blur(10px); }
        .modal-card { background: #111; padding: 40px; border-radius: 30px; border: 1px solid #222; width: 90%; max-width: 380px; text-align: center; }
        .google-login { background: white; color: black; padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 20px; }
    </style>
</head>
<body>

    <section class="hero">
        <h1>مستقبل الربح مع <br><span>MR CASH</span></h1>
        <p>أكمل العروض البسيطة، اجمع النقاط، واسحب أرباحك فوراً بطرقك المفضلة.</p>
        <button class="btn-start" onclick="toggleModal()">ابدأ الآن مجاناً</button>
    </section>

    <div class="modal" id="loginModal">
        <div class="modal-card">
            <h2>انضم إلينا</h2>
            <p style="color:#666; margin-bottom: 20px;">سجل دخولك عبر جوجل للبدء فوراً</p>
            <div class="google-login" onclick="loginWithGoogle()">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="20">
                تسجيل الدخول بجوجل
            </div>
            <p style="margin-top: 25px; color:#444; cursor:pointer;" onclick="toggleModal()">إلغاء</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAd9KgnzExZ5RdrJVB_hpzxUvrqHiQ3jmU",
            authDomain: "mrcash-com.firebaseapp.com",
            projectId: "mrcash-com",
            appId: "1:348374269609:web:9fed2a4f69f2c0f00ff3b8"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        window.toggleModal = () => {
            const m = document.getElementById('loginModal');
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        }

        window.loginWithGoogle = () => {
            signInWithPopup(auth, provider).then(() => window.location.href = "dashboard.html");
        }
    </script>
</body>
</html>
