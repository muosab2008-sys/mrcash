<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MrCash | اربح النقود</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <style>
        :root {
            --bg-color: #0b0b0b;
            --card-bg: #141414;
            --primary-color: #00c853; /* أخضر مثل Earng */
            --accent-color: #ff9800; /* برتقالي للسحب */
            --text-color: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* --- شريط المستخدمين الوهمي --- */
        .live-feed {
            background: #1a1a1a;
            height: 40px;
            overflow: hidden;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #333;
        }

        #feed-container {
            display: flex;
            white-space: nowrap;
            animation: scroll-left 20s linear infinite;
        }

        .feed-item {
            margin: 0 20px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .feed-item span { color: var(--primary-color); font-weight: bold; }

        @keyframes scroll-left {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        /* --- الهيدر --- */
        header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
        }

        .logo { font-size: 1.5rem; font-weight: bold; color: var(--primary-color); }

        /* --- قسم السحب (مثل الصورة) --- */
        .section-title { padding: 20px; font-size: 1.2rem; }
        
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            padding: 0 20px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid #222;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            transition: 0.3s;
            cursor: pointer;
        }

        .card:hover { border-color: var(--primary-color); transform: translateY(-5px); }

        .card img { width: 50px; height: 50px; object-fit: contain; margin-bottom: 10px; }

        /* --- تسجيل الدخول بجوجل --- */
        .login-btn-container {
            display: flex;
            justify-content: center;
            padding: 50px;
        }

        /* --- الشركات (Offerwalls) --- */
        .offer-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            padding: 20px;
        }

        .offer-card {
            background: linear-gradient(145deg, #1a1a1a, #000);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            border: 1px solid #333;
        }
    </style>
</head>
<body>

    <div class="live-feed">
        <div id="feed-container">
            </div>
    </div>

    <header>
        <div class="logo"><i class="fas fa-coins"></i> MRCASH</div>
        <div id="g_id_onload"
             data-client_id="YOUR_GOOGLE_CLIENT_ID"
             data-callback="handleCredentialResponse">
        </div>
        <div class="g_id_signin" data-type="standard"></div>
    </header>

    <main>
        <h3 class="section-title">شركاء العروض</h3>
        <div class="offer-grid">
            <div class="offer-card">
                <img src="https://via.placeholder.com/50/FFD700" alt="">
                <h4>Lootably</h4>
                <p>عروض ذهبية</p>
                <span>⭐⭐⭐⭐⭐</span>
            </div>
            <div class="offer-card">
                <img src="https://via.placeholder.com/50/00C853" alt="">
                <h4>OfferToro</h4>
                <p>تطبيقات وألعاب</p>
                <span>⭐⭐⭐⭐⭐</span>
            </div>
        </div>

        <h3 class="section-title">طرق السحب المتوفرة</h3>
        <div class="grid-container">
            <div class="card">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/Visa_Inc._logo.svg" alt="Visa">
                <div>Visa</div>
            </div>
            <div class="card">
                <img src="https://upload.wikimedia.org/wikipedia/commons/b/b5/PayPal.svg" alt="PayPal">
                <div>PayPal</div>
            </div>
            <div class="card">
                <img src="https://w7.pngwing.com/pngs/410/505/png-transparent-pubg-mobile-playerunknown-s-battlegrounds-logo-game-pubg-mobile-logo-text-orange-logo.png" alt="PUBG">
                <div>PUBG</div>
            </div>
            <div class="card">
                <img src="https://upload.wikimedia.org/wikipedia/en/2/21/Free_Fire_Logo.png" alt="Free Fire">
                <div>Free Fire</div>
            </div>
        </div>
    </main>

    <script>
        // --- برمجة الشريط الوهمي ---
        const names = ["أحمد", "سارة", "محمد", "ياسين", "عمر", "إيمان", "Sami", "User99"];
        const amounts = [50, 120, 340, 60, 200, 15, 430];
        const companies = ["Lootably", "AdGate", "CPALead", "OfferToro"];

        function createFeedItems() {
            const container = document.getElementById('feed-container');
            for (let i = 0; i < 20; i++) {
                const name = names[Math.floor(Math.random() * names.length)];
                const amount = amounts[Math.floor(Math.random() * amounts.length)];
                const company = companies[Math.floor(Math.random() * companies.length)];
                
                const item = document.createElement('div');
                item.className = 'feed-item';
                item.innerHTML = `<i class="fas fa-user-circle"></i> ${name} ربح <span>${amount} نقطة</span> عبر ${company}`;
                container.appendChild(item);
            }
        }

        // --- معالجة دخول جوجل ---
        function handleCredentialResponse(response) {
            console.log("Encoded JWT ID token: " + response.credential);
            alert("تم تسجيل دخولك بنجاح في MrCash!");
            // هنا ترسل الـ Token لسيفرك الخاص
        }

        window.onload = createFeedItems;
    </script>
</body>
</html>
