<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earnly | Dashboard</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --primary-green: #00c853;
            --bg-black: #0a0a0a;
            --sidebar-bg: #111111;
            --card-bg: #0d0d0d;
            --border: #1f1f1f;
            --text: #ffffff;
            --muted: #888;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
        body { background-color: var(--bg-black); color: var(--text); display: flex; min-height: 100vh; }

        /* القائمة الجانبية - Sidebar */
        aside {
            width: 260px; background: var(--sidebar-bg); border-left: 1px solid var(--border);
            display: flex; flex-direction: column; position: fixed; height: 100vh; right: 0;
        }
        .logo-area { padding: 30px; font-size: 1.8rem; font-weight: 900; color: var(--primary-green); display: flex; align-items: center; gap: 10px; }
        .menu { flex: 1; padding: 20px; }
        .menu-item { 
            display: flex; align-items: center; gap: 15px; padding: 12px 20px; 
            color: var(--muted); text-decoration: none; border-radius: 12px; margin-bottom: 5px; font-weight: 600;
        }
        .menu-item.active { background: var(--primary-green); color: #000; }
        .menu-item:hover:not(.active) { background: #1a1a1a; color: #fff; }

        /* المحتوى الرئيسي */
        main { flex: 1; margin-right: 260px; padding: 20px 40px; }

        /* الشريط العلوي */
        header { 
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; 
            background: #111; padding: 15px 30px; border-radius: 15px; border: 1px solid var(--border);
        }
        .user-stats { display: flex; align-items: center; gap: 20px; }
        .stat-badge { background: #1a1a1a; padding: 8px 15px; border-radius: 10px; display: flex; align-items: center; gap: 10px; font-weight: bold; border: 1px solid #333; }
        .user-profile { display: flex; align-items: center; gap: 10px; background: #222; padding: 5px 15px; border-radius: 12px; }
        .user-profile img { width: 35px; height: 35px; border-radius: 50%; }

        /* شبكة العروض */
        .section-title { font-size: 1.4rem; font-weight: 800; margin-bottom: 25px; display: flex; align-items: center; gap: 10px; }
        .offers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }

        /* تصميم البطاقة مثل الصورة */
        .offer-card {
            background: var(--card-bg); border-radius: 20px; padding: 25px; border: 1px solid var(--border);
            position: relative; transition: 0.3s; cursor: pointer; text-align: center; overflow: hidden;
        }
        .offer-card::before { content: ''; position: absolute; top:0; left:0; width:100%; height:4px; opacity: 0.5; }
        .card-green::before { background: var(--primary-green); }
        .card-purple::before { background: #7c4dff; }
        .card-blue::before { background: #0091ea; }

        .offer-card:hover { transform: translateY(-5px); border-color: var(--primary-green); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .top-badge { 
            position: absolute; top: 15px; left: 15px; background: rgba(255,255,255,0.05); 
            padding: 4px 12px; border-radius: 50px; font-size: 0.7rem; font-weight: 700; border: 1px solid #333;
        }
        .offer-logo { font-size: 2.2rem; font-weight: 900; margin-top: 30px; display: block; }
        .offer-desc { color: var(--muted); font-size: 0.9rem; margin: 10px 0; }
        .stars { color: #ffab00; font-size: 0.8rem; margin-bottom: 15px; }

        /* زر خاص بالبطاقة */
        .btn-open { 
            width: 100%; background: #1a1a1a; border: 1px solid #333; color: white; 
            padding: 10px; border-radius: 10px; font-weight: 700; cursor: pointer;
        }
        .offer-card:hover .btn-open { background: var(--primary-green); color: #000; border-color: var(--primary-green); }

        /* ستايل الموبايل */
        @media (max-width: 768px) {
            aside { width: 70px; }
            aside span, .logo-area span { display: none; }
            main { margin-right: 70px; }
        }
    </style>
</head>
<body>

    <aside>
        <div class="logo-area">
            <i class="fas fa-coins"></i> <span>EARNLY</span>
        </div>
        <div class="menu">
            <a href="#" class="menu-item active"><i class="fas fa-home"></i> <span>يكسب</span></a>
            <a href="#" class="menu-item"><i class="fas fa-grid-2"></i> <span>عروض</span></a>
            <a href="#" class="menu-item"><i class="fas fa-handshake"></i> <span>الشركاء</span></a>
            <a href="#" class="menu-item" onclick="showSection('withdraw')"><i class="fas fa-wallet"></i> <span>سحب نقدي</span></a>
            <a href="#" class="menu-item"><i class="fas fa-users"></i> <span>الشريك</span></a>
        </div>
        <div style="padding: 20px;">
            <div style="background: var(--primary-green); color: #000; padding: 15px; border-radius: 15px; text-align: center; font-weight: 900;">
                مدار مكث
            </div>
        </div>
    </aside>

    <main>
        <header>
            <div class="section-title">Offer Partners</div>
            <div class="user-stats">
                <div class="stat-badge"><i class="fas fa-coins" style="color: gold;"></i> 0</div>
                <div class="user-profile" id="user-info">
                    <img src="https://i.pravatar.cc/100" id="user-img">
                    <span id="user-name">زائر</span>
                    <i class="fas fa-chevron-down" style="font-size: 0.7rem;"></i>
                </div>
                <i class="fas fa-bell" style="color: var(--muted);"></i>
            </div>
        </header>

        <div class="section-title"><i class="fas fa-th-large" style="color: var(--primary-green);"></i> شركاء العرض</div>
        
        <div class="offers-grid">
            <div class="offer-card card-purple">
                <div class="top-badge">ترينسبلان</div>
                <span class="offer-logo" style="color: #a29bfe;">PLAYTIME</span>
                <p class="offer-desc">إعلانات وقت التشغيل</p>
                <div class="stars">★★★★★</div>
                <button class="btn-open">فتح الجدار</button>
            </div>

            <div class="offer-card card-blue">
                <div class="top-badge">عروض موثوقة</div>
                <span class="offer-logo" style="color: #81ecec;">GemiAd</span>
                <p class="offer-desc">جيمياد</p>
                <div class="stars">★★★★☆</div>
                <button class="btn-open" onclick="openWall('https://gemiwall.com/6977536ec6ceefce12a28330/', 'sub_id')">فتح الجدار</button>
            </div>

            <div class="offer-card card-green">
                <div class="top-badge">2X 💰</div>
                <span class="offer-logo" style="color: var(--primary-green);">Offery</span>
                <p class="offer-desc">عروض</p>
                <div class="stars">★★★★★</div>
                <button class="btn-open" onclick="openWall('https://offery.io/offerwall/9tns2375b9z4y9lmz8pisa2e6vma05/', 'sub_id')">فتح الجدار</button>
            </div>

            <div class="offer-card card-purple">
                <div class="top-badge">جدار العروض الترويجية</div>
                <span class="offer-logo" style="color: #ff7675;">lootably</span>
                <p class="offer-desc">بشكل قبل للنهب</p>
                <div class="stars">★★★★★</div>
                <button class="btn-open">فتح الجدار</button>
            </div>
        </div>
    </main>

    <script>
        // دالة فتح الجدران مع حل مشكلة sub_id
        function openWall(url, subIdKey) {
            const user = firebase.auth().currentUser;
            if(user) {
                // نربط المعرف بالرابط بطريقة صحيحة لعدم ظهور خطأ Missing sub_id
                const separator = url.includes('?') ? '&' : '?';
                window.open(`${url}${separator}${subIdKey}=${user.uid}`, '_blank');
            } else {
                alert("يرجى تسجيل الدخول أولاً!");
            }
        }

        // إعدادات Firebase (ضع بياناتك هنا)
        const firebaseConfig = {
            apiKey: "AIzaSyBxlADpedVvasxiwOA3ESAPv73j7feck00",
            authDomain: "mrcash-9e428.firebaseapp.com",
            projectId: "mrcash-9e428",
            storageBucket: "mrcash-9e428.appspot.com",
            messagingSenderId: "537730003026",
            appId: "1:537730003026:web:82e58fd16d9ec4feaf6f8b"
        };
        firebase.initializeApp(firebaseConfig);

        firebase.auth().onAuthStateChanged(user => {
            if(user) {
                document.getElementById('user-name').innerText = user.displayName;
                document.getElementById('user-img').src = user.photoURL;
            }
        });
    </script>
</body>
</html>
