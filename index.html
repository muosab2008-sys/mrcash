<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ميست كاش | المظهر الجديد</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --primary: #00ffa3;
            --bg-dark: #0a0c10;
            --card-dark: #161b22;
            --text-main: #ffffff;
            --text-dim: #8b949e;
            --border: #30363d;
            --accent: linear-gradient(135deg, #00ffa3 0%, #03a9f4 100%);
        }

        * { box-sizing: border-box; transition: 0.3s; }
        body { 
            background-color: var(--bg-dark); 
            color: var(--text-main); 
            font-family: 'Cairo', sans-serif; 
            margin: 0; 
            padding-bottom: 70px; /* للموبايل nav */
        }

        /* Sidebar Desktop */
        .sidebar {
            width: 260px; height: 100vh; background: #010409;
            position: fixed; right: 0; top: 0; border-left: 1px solid var(--border);
            display: flex; flex-direction: column; z-index: 1000;
        }

        .nav-link {
            padding: 15px 25px; color: var(--text-dim); text-decoration: none;
            display: flex; align-items: center; gap: 12px; cursor: pointer;
        }
        .nav-link:hover, .nav-link.active { color: var(--primary); background: rgba(0,255,163,0.05); }
        .nav-link i { font-size: 1.2rem; }

        /* Main Content */
        main { margin-right: 260px; padding: 25px; }

        /* Header Stats */
        .top-stats {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 30px;
        }
        .stat-box {
            background: var(--card-dark); padding: 20px; border-radius: 20px;
            border: 1px solid var(--border); display: flex; align-items: center; gap: 15px;
        }
        .stat-box i { color: var(--primary); font-size: 1.8rem; }

        /* Grid System */
        .section-title { margin: 25px 0 15px; font-weight: 900; display: flex; align-items: center; gap: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }

        /* Partner Cards */
        .card {
            background: var(--card-dark); border: 1px solid var(--border);
            border-radius: 22px; padding: 20px; text-align: center; cursor: pointer;
        }
        .card:hover { border-color: var(--primary); transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        .card img { width: 50px; height: 50px; border-radius: 12px; margin-bottom: 10px; }
        .card h4 { margin: 5px 0; font-size: 0.9rem; }
        .badge { background: var(--primary); color: #000; font-size: 0.6rem; padding: 2px 8px; border-radius: 5px; font-weight: 900; }

        /* Withdraw Cards */
        .w-card {
            background: var(--card-dark); border-radius: 20px; padding: 15px; text-align: center; border: 1px solid var(--border);
        }
        .w-btn {
            background: var(--accent); border: none; width: 100%; padding: 10px; 
            border-radius: 12px; font-weight: 900; cursor: pointer; margin-top: 10px;
        }

        /* UI Overlays */
        #login-screen { position: fixed; inset: 0; background: var(--bg-dark); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #wall-view { position: fixed; inset: 0; background: #000; z-index: 10000; display: none; flex-direction: column; }

        /* Mobile Bottom Nav */
        @media (max-width: 768px) {
            .sidebar {
                width: 100%; height: 65px; top: auto; bottom: 0; flex-direction: row;
                justify-content: space-around; border-left: none; border-top: 1px solid var(--border);
            }
            .nav-link { flex-direction: column; font-size: 0.7rem; padding: 10px; gap: 4px; flex: 1; }
            .sidebar-brand, .nav-label { display: none; }
            main { margin-right: 0; padding: 15px; }
            .top-stats { grid-template-columns: 1fr 1fr; }
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<div id="login-screen">
    <div style="text-align:center; background: var(--card-dark); padding: 40px; border-radius: 30px; border: 1px solid var(--border);">
        <h1 style="color: var(--primary); margin: 0;">MIST CASH</h1>
        <p style="color: var(--text-dim);">أهلاً بك في الجيل الجديد من الربح</p>
        <button onclick="login()" style="background: var(--accent); border:none; padding: 15px 30px; border-radius: 50px; font-weight: 900; cursor: pointer; margin-top: 20px;">
            <i class="fab fa-google"></i> ابدأ الآن عبر جوجل
        </button>
    </div>
</div>

<aside class="sidebar">
    <div class="sidebar-brand" style="padding: 20px; font-weight: 900; color: var(--primary); font-size: 1.5rem;">MIST CASH</div>
    <a class="nav-link active" onclick="showTab('earn', this)"><i class="fas fa-gamepad"></i> <span>العروض</span></a>
    <a class="nav-link" onclick="showTab('withdraw', this)"><i class="fas fa-wallet"></i> <span>السحب</span></a>
    <a class="nav-link" onclick="showTab('account', this)"><i class="fas fa-user-circle"></i> <span>حسابي</span></a>
</aside>

<main>
    <div class="top-stats">
        <div class="stat-box"><i class="fas fa-coins"></i> <div><small>نقاطك</small><div id="pts" style="font-weight: 900; font-size: 1.2rem;">0</div></div></div>
        <div class="stat-box"><i class="fas fa-dollar-sign"></i> <div><small>الرصيد</small><div id="bal" style="font-weight: 900; font-size: 1.2rem;">$0.00</div></div></div>
    </div>

    <section id="earn-tab">
        <div class="section-title"><i class="fas fa-fire"></i> شركات العروض</div>
        <div class="grid" id="partners-list">
            </div>
    </section>

    <section id="withdraw-tab" class="hidden">
        <div class="section-title"><i class="fas fa-hand-holding-usd"></i> استبدال النقاط</div>
        <div class="grid">
            <div class="w-card">
                <i class="fab fa-paypal" style="color: #0070ba; font-size: 2.5rem;"></i>
                <h4>PayPal $5</h4>
                <p style="color:var(--primary)">5,000 نقطة</p>
                <button class="w-btn" onclick="requestWithdraw(5000, 'PayPal $5')">طلب سحب</button>
            </div>
            <div class="w-card">
                <i class="fas fa-mobile-alt" style="color: #e60000; font-size: 2.5rem;"></i>
                <h4>فودافون كاش</h4>
                <p style="color:var(--primary)">1,000 نقطة</p>
                <button class="w-btn" onclick="requestWithdraw(1000, 'Vodafone Cash 50 EGP')">طلب سحب</button>
            </div>
        </div>
    </section>

    <section id="account-tab" class="hidden">
        <div class="card" style="max-width: 400px; margin: auto;">
            <div id="u-name" style="font-weight: 900; font-size: 1.2rem;">...</div>
            <div id="u-email" style="color: var(--text-dim); margin-bottom: 20px;">...</div>
            <button onclick="auth.signOut()" style="background: #ff4757; color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer;">تسجيل الخروج</button>
        </div>
    </section>
</main>

<div id="wall-view">
    <div style="padding: 15px; background: #010409; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border);">
        <b id="active-wall-name">جدار المهمات</b>
        <button onclick="closeWall()" style="background: #ff4757; border: none; color: white; padding: 5px 15px; border-radius: 8px;">إغلاق X</button>
    </div>
    <iframe id="wall-iframe" style="flex-grow: 1; border: none; background: #fff;"></iframe>
</div>

<script>
    // الإعدادات
    const firebaseConfig = {
        apiKey: "AIzaSyBxlADpedVvasxiwOA3ESAPv73j7feck00",
        authDomain: "mrcash-9e428.firebaseapp.com",
        projectId: "mrcash-9e428",
        storageBucket: "mrcash-9e428.firebasestorage.app",
        messagingSenderId: "537730003026",
        appId: "1:537730003026:web:82e58fd16d9ec4feaf6f8b"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    let currentUID = "";

    // إضافة Offery والشركات الأخرى
    const partners = [
        { name: "Offery", icon: "https://offery.io/assets/images/logo-icon.png", badge: "جديد", url: "https://offery.io/offerwall/9tns2375b9z4y9lmz8pisa2e6vma05/" },
        { name: "Adlexy", icon: "https://adlexy.com/favicon.ico", badge: "رائج", url: "https://adlexy.com/offerwall/h7mx23bis2zaib6apwwe73uv3gr92i/" },
        { name: "Monlix", icon: "https://monlix.com/favicon.ico", badge: "20%+", url: "https://offers.monlix.com/?appid=YOUR_ID&userid=" },
        { name: "CPALead", icon: "https://www.cpalead.com/favicon.ico", badge: "HOT", url: "https://www.cpalead.com/mobile/locker/index.php?pub=YOUR_ID&user_id=" }
    ];

    function showTab(tabId, el) {
        document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        document.getElementById(tabId + '-tab').classList.remove('hidden');
        el.classList.add('active');
    }

    function renderPartners() {
        const list = document.getElementById('partners-list');
        partners.forEach(p => {
            list.innerHTML += `
                <div class="card" onclick="openWall('${p.url}', '${p.name}')">
                    <div class="badge">${p.badge}</div>
                    <img src="${p.icon}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3135/3135706.png'">
                    <h4>${p.name}</h4>
                </div>
            `;
        });
    }

    function openWall(url, name) {
        if(!currentUID) return alert("سجل دخولك أولاً");
        document.getElementById('active-wall-name').innerText = name;
        document.getElementById('wall-view').style.display = 'flex';
        document.getElementById('wall-iframe').src = url + currentUID;
    }

    function closeWall() {
        document.getElementById('wall-view').style.display = 'none';
        document.getElementById('wall-iframe').src = "";
    }

    function login() {
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithPopup(provider);
    }

    async function requestWithdraw(ptsNeeded, method) {
        const userRef = db.collection('users').doc(currentUID);
        const doc = await userRef.get();
        const balance = doc.data()?.points || 0;

        if(balance < ptsNeeded) {
            return alert("رصيدك غير كافٍ، استمر في تنفيذ العروض!");
        }

        if(confirm(`هل أنت متأكد من سحب ${ptsNeeded} نقطة مقابل ${method}؟`)) {
            await userRef.update({ points: firebase.firestore.FieldValue.increment(-ptsNeeded) });
            await db.collection('withdrawals').add({
                uid: currentUID,
                method: method,
                points: ptsNeeded,
                status: 'pending',
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            alert("تم إرسال طلبك للمراجعة!");
        }
    }

    auth.onAuthStateChanged(user => {
        if (user) {
            currentUID = user.uid;
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('u-name').innerText = user.displayName;
            document.getElementById('u-email').innerText = user.email;
            
            db.collection('users').doc(user.uid).onSnapshot(doc => {
                const data = doc.data() || { points: 0 };
                document.getElementById('pts').innerText = Number(data.points).toLocaleString();
                document.getElementById('bal').innerText = "$" + (data.points / 1000).toFixed(2);
            });
        } else {
            document.getElementById('login-screen').classList.remove('hidden');
        }
    });

    renderPartners();
</script>
</body>
</html>
